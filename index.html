<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SHANA CALC BEAST - Tesla UI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.1/math.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/nerdamer.core.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/Algebra.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/Calculus.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/Solve.js"></script>
<style>
  :root{
    --bg: #050508;
    --card: rgba(17,17,25,0.6);
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --btn: rgba(31,41,55,0.7);
    --btn-hover: rgba(55,65,81,0.9);
    --glow: 0 0 20px rgba(0,212,255,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;}
  body{
    background: radial-gradient(1200px 800px at 80% -10%, #00d4ff22, transparent),
                radial-gradient(800px 600px at 20% 110%, #7c3aed22, transparent),
                var(--bg);
    color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:10px;
    overflow-x:hidden;
  }
.calc{width:100%; max-width:1500px; background:var(--card); border:1px solid rgba(255,255,255,0.1); border-radius:32px; padding:24px; backdrop-filter: blur(20px); box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.5); animation: fadeIn 0.6s ease;}
  @keyframes fadeIn{ from{opacity:0; transform: translateY(20px);} to{opacity:1; transform: translateY(0);} }
.header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px;}
.header h1{background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-size:32px; font-weight:900; letter-spacing:-1px; text-shadow: 0 0 30px rgba(0,212,255,0.3);}
.tab-wrapper{display:flex; gap:10px; align-items:center; width:100%;}
.tab-select{flex:1; padding:12px 16px; background:var(--btn); border:1px solid rgba(255,255,255,0.1); border-radius:14px; color:var(--text); font-weight:600; font-size:16px; backdrop-filter: blur(10px); cursor:pointer;}
.tab-arrow{padding:12px 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius:14px; cursor:pointer; font-weight:800; box-shadow: var(--glow); user-select: none; -webkit-user-select: none;}
.tabs{display:none; gap:10px; flex-wrap:wrap; overflow-x:auto; padding-bottom:5px;}
.tabs.show{display:flex;}
.panel{background:rgba(13,13,18,0.7); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:20px; backdrop-filter: blur(10px);}
  #display{width:100%; background:rgba(0,0,0,0.8); color:var(--text); font-size:40px; padding:20px; border-radius:16px; border:1px solid rgba(0,212,255,0.3); text-align:right; margin-bottom:16px; font-weight:700; box-shadow: inset 0 0 20px rgba(0,212,255,0.1); transition:0.3s;}
  #display:focus{outline:none; border-color:var(--accent); box-shadow: 0 0 30px rgba(0,212,255,0.3);}
.btn-grid{display:grid; grid-template-columns: repeat(6,1fr); gap:10px;}
.btn{padding:14px; background:var(--btn); border:none; color:var(--text); border-radius:14px; font-size:16px; cursor:pointer; transition: all 0.2s ease; border:1px solid rgba(255,255,255,0.05); font-weight:600; backdrop-filter: blur(10px); touch-action: manipulation; user-select: none; -webkit-user-select: none;}
.btn:hover{background:var(--btn-hover); transform: translateY(-3px) scale(1.02); box-shadow: var(--glow);}
.btn:active{transform: scale(0.95);}
.btn.op{background: linear-gradient(135deg, #3b0764, #581c87);}
.btn.eq{background: linear-gradient(135deg, var(--accent), var(--accent2)); font-weight:800; box-shadow: var(--glow);}
.btn.green{background: linear-gradient(135deg, #065f46, #047857);}
.btn.sci{background: linear-gradient(135deg, #1e3a8a, #3730a3); font-size:14px;}
.btn.voice{background: linear-gradient(135deg, #991b1b, #be185d);}
  canvas, #plotly3d{background:rgba(0,0,0,0.8); border-radius:16px; width:100%!important; height:400px!important; border:1px solid rgba(0,212,255,0.2);}
.steps{background:rgba(0,0,0,0.8); padding:16px; border-radius:14px; font-family:'Fira Code', monospace; font-size:14px; max-height:400px; overflow:auto; color:#22c55e; border:1px solid rgba(34,197,94,0.3); white-space:pre-wrap;}
  input[type="text"]{width:100%; padding:14px; background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:var(--text); margin-bottom:12px; font-size:16px; transition:0.3s;}
  input[type="text"]:focus{outline:none; border-color:var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.2);}
.history{max-height:200px; overflow:auto; font-size:13px; color:var(--muted);}
  table{width:100%; border-collapse:collapse; font-size:14px;}
  td, th{border:1px solid rgba(255,255,255,0.1); padding:8px; text-align:center;}
.slider-row{display:flex; gap:10px; align-items:center; margin:10px 0;}
.slider-row label{width:100px; color:var(--muted);}

  @media(max-width: 768px){
    body{padding:8px;}
.calc{padding:16px; border-radius:24px;}
.header h1{font-size:24px;}
    #display{font-size:28px; padding:16px;}
.btn{padding:12px; font-size:14px;}
.btn-grid{gap:6px; grid-template-columns: repeat(5,1fr);}
    canvas, #plotly3d{height:300px!important;}
  }
  #installBanner{display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background: linear-gradient(135deg, var(--accent), var(--accent2)); padding:14px 24px; border-radius:16px; box-shadow: var(--glow); z-index:9999; cursor:pointer; font-weight:700; color:#fff; border:none;}
</style>
</head>
<body>
<div id="installBanner" onclick="installPWA()">📲 Install SHANA BEAST</div>

<div class="calc">
  <div class="header">
    <h1>SHANA CALC BEAST</h1>
    <div class="tab-wrapper">
      <select class="tab-select" id="tabSelect" onchange="switchTabFromSelect(this.value)">
        <option value="basic">Basic</option>
        <option value="graph">Graph 2D</option>
        <option value="graph3d">Graph 3D</option>
        <option value="smart">Smart CAS</option>
        <option value="units">Unit Converter</option>
        <option value="finance">Finance</option>
        <option value="steps">Step Solver</option>
        <option value="matrix">Matrix</option>
        <option value="stats">Stats Pro</option>
        <option value="history">History</option>
      </select>
      <div class="tab-arrow" onclick="toggleTabs()">▼</div>
    </div>
    <div class="tabs" id="tabsRow">
      <div class="tab active" onclick="switchTab(event, 'basic')">Basic</div>
      <div class="tab" onclick="switchTab(event, 'graph')">Graph 2D</div>
      <div class="tab" onclick="switchTab(event, 'graph3d')">Graph 3D</div>
      <div class="tab" onclick="switchTab(event, 'smart')">Smart CAS</div>
      <div class="tab" onclick="switchTab(event, 'units')">Units</div>
      <div class="tab" onclick="switchTab(event, 'finance')">Finance</div>
      <div class="tab" onclick="switchTab(event, 'steps')">Step Solver</div>
      <div class="tab" onclick="switchTab(event, 'matrix')">Matrix</div>
      <div class="tab" onclick="switchTab(event, 'stats')">Stats Pro</div>
      <div class="tab" onclick="switchTab(event, 'history')">History</div>
    </div>
  </div>

  <div id="basic" class="tab-content">
    <input type="text" id="display" placeholder="Type: 3+4i, derivative x^2, solve {x+y=10,x-y=2}">
    <div style="display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap;">
      <button class="btn green" onclick="shareWhatsApp()">📲 Share</button>
      <button class="btn" onclick="saveToHistory()">💾 Save</button>
      <button class="btn voice" onclick="startVoice()">🎤 Voice</button>
      <button class="btn" onclick="toggleDegRad()">DEG: <span id="degRad">DEG</span></button>
    </div>
    <div class="btn-grid">
      <button class="btn sci" onclick="add('sin(')">sin</button>
      <button class="btn sci" onclick="add('cos(')">cos</button>
      <button class="btn sci" onclick="add('tan(')">tan</button>
      <button class="btn sci" onclick="add('log(')">log</button>
      <button class="btn sci" onclick="add('ln(')">ln</button>
      <button class="btn sci" onclick="add('sqrt(')">√</button>
      <button class="btn sci" onclick="add('i')">i</button>
      <button class="btn sci" onclick="add('conj(')">conj</button>
      <button class="btn sci" onclick="add('re(')">re</button>
      <button class="btn sci" onclick="add('im(')">im</button>
      <button class="btn sci" onclick="add('abs(')">|z|</button>
      <button class="btn sci" onclick="add('!')">x!</button>

      <button class="btn" onclick="clearDisplay()">C</button>
      <button class="btn" onclick="del()">DEL</button>
      <button class="btn op" onclick="add(')">(</button>
      <button class="btn op" onclick="add(')')">)</button>
      <button class="btn op" onclick="add('/')">÷</button>
      <button class="btn op" onclick="add('^')">x^y</button>

      <button class="btn" onclick="add('7')">7</button>
      <button class="btn" onclick="add('8')">8</button>
      <button class="btn" onclick="add('9')">9</button>
      <button class="btn op" onclick="add('*')">×</button>
      <button class="btn op" onclick="add('pi')">π</button>
      <button class="btn op" onclick="add('e')">e</button>

      <button class="btn" onclick="add('4')">4</button>
      <button class="btn" onclick="add('5')">5</button>
      <button class="btn" onclick="add('6')">6</button>
      <button class="btn op" onclick="add('-')">-</button>
      <button class="btn op" onclick="add('%')">%</button>
      <button class="btn op" onclick="add('to')">to</button>

      <button class="btn" onclick="add('1')">1</button>
      <button class="btn" onclick="add('2')">2</button>
      <button class="btn" onclick="add('3')">3</button>
      <button class="btn op" onclick="add('+')">+</button>
      <button class="btn op" onclick="add('ans')">ANS</button>
      <button class="btn eq" onclick="calculate()">=</button>

      <button class="btn" onclick="add('0')">0</button>
      <button class="btn" onclick="add('.')">.</button>
      <button class="btn" style="grid-column: span 4;" onclick="add('00')">00</button>
    </div>
  </div>

  <div id="graph" class="tab-content" style="display:none;">
    <input type="text" id="graphInput" placeholder="Enter function: a*x^2 + b*x">
    <div class="slider-row"><label>a: <span id="aVal">1</span></label><input type="range" id="aSlider" min="-5" max="5" step="0.1" value="1" oninput="updateSlider('a',this.value)"></div>
    <div class="slider-row"><label>b: <span id="bVal">0</span></label><input type="range" id="bSlider" min="-10" max="10" step="0.1" value="0" oninput="updateSlider('b',this.value)"></div>
    <button class="btn eq" onclick="drawGraph()">Graph 2D</button>
    <button class="btn" onclick="exportGraph()">📸 Export PNG</button>
    <canvas id="graphCanvas"></canvas>
  </div>

  <div id="graph3d" class="tab-content" style="display:none;">
    <input type="text" id="graph3dInput" placeholder="Enter 3D: sin(sqrt(x^2+y^2))">
    <button class="btn eq" onclick="drawGraph3D()">Graph 3D</button>
    <div id="plotly3d"></div>
  </div>

  <div id="smart" class="tab-content" style="display:none;">
    <input type="text" id="smartInput" placeholder="derivative x^3, integral sin(x), solve x^2-5x+6=0, solve {x+y=10,x-y=2}">
    <button class="btn eq" onclick="smartCalc()">Solve with CAS</button>
    <div id="smartResult" class="steps"></div>
  </div>

  <div id="units" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Unit Converter Pro</h3>
      <input type="text" id="unitInput" placeholder="5 kg to lb, 100 C to F, 50 USD to EUR">
      <button class="btn eq" onclick="convertUnit()">Convert</button>
      <div id="unitResult" class="steps"></div>
    </div>
  </div>

  <div id="finance" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Finance HP12C Pro</h3>
      <input type="text" id="loanAmount" placeholder="Loan Amount">
      <input type="text" id="loanRate" placeholder="Interest Rate % per year">
      <input type="text" id="loanYears" placeholder="Years">
      <button class="btn eq" onclick="calcLoan()">Calculate Payment</button>
      <div id="loanResult" class="steps"></div>
    </div>
  </div>

  <div id="steps" class="tab-content" style="display:none;">
    <input type="text" id="stepInput" placeholder="solve x^2 - 5x + 6 = 0">
    <button class="btn eq" onclick="showSteps()">Show Full Steps</button>
    <div id="stepResult" class="steps"></div>
  </div>

  <div id="matrix" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Matrix Calculator 3x3</h3>
      <table id="matrixTable"></table>
      <button class="btn eq" onclick="calcMatrix()">Det + Inverse</button>
      <div id="matrixResult" class="steps" style="margin-top:10px;"></div>
    </div>
  </div>

  <div id="stats" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Statistics + Regression</h3>
      <input type="text" id="statsInput" placeholder="X: 1,2,3,4,5">
      <input type="text" id="statsInputY" placeholder="Y: 2,4,5,4,5">
      <button class="btn eq" onclick="calcStats()">Mean, SD, Linear Regression</button>
      <div id="statsResult" class="steps" style="margin-top:10px;"></div>
    </div>
  </div>

  <div id="history" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Calculation History</h3>
      <button class="btn" onclick="clearHistory()">Clear History</button>
      <div id="historyList" class="history" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
let chart;
let history = JSON.parse(localStorage.getItem('shanaHistory')) || [];
let deferredPrompt;
let lastAns = 0;
let isDeg = true;
let sliders = {a:1, b:0};

// PWA
const manifest = {"name":"SHANA CALC BEAST","short_name":"SHANA","start_url":".","display":"standalone","background_color":"#050508","theme_color":"#00d4ff","orientation":"portrait"};
document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'}))}">`);
if('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(new Blob([`self.addEventListener('install',e=>e.waitUntil(caches.open('shana-v45').then(c=>c.addAll(['./']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`], {type: 'application/javascript'})));

window.addEventListener('beforeinstallprompt', (e) => {e.preventDefault(); deferredPrompt = e; document.getElementById('installBanner').style.display = 'block';});
function installPWA(){if(deferredPrompt){deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>document.getElementById('installBanner').style.display = 'none');}}

function toggleDegRad(){isDeg =!isDeg; document.getElementById('degRad').innerText = isDeg? 'DEG' : 'RAD';}
function toggleTabs(){document.getElementById('tabsRow').classList.toggle('show');}
function switchTabFromSelect(tab){document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none'); document.getElementById(tab).style.display='block'; document.getElementById('tabSelect').value = tab; if(tab==='matrix') buildMatrix(); if(tab==='history') loadHistory();}
function switchTab(e, tab){document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none'); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById(tab).style.display='block'; e.target.classList.add('active'); document.getElementById('tabSelect').value = tab; document.getElementById('tabsRow').classList.remove('show'); if(tab==='matrix') buildMatrix(); if(tab==='history') loadHistory();}

function add(val){if(val === 'ans') val = lastAns; document.getElementById('display').value += val;}
function clearDisplay(){document.getElementById('display').value = '';}
function del(){let d=document.getElementById('display'); d.value = d.value.slice(0,-1);}

// MATHJS WITH COMPLEX SUPPORT
function calculate(){
  try{
    let expr = document.getElementById('display').value;
    expr = expr.replace(/(\d+)\s*kg\s*to\s*lb/gi, (_,n)=>`${n}*2.20462`);
    expr = expr.replace(/(\d+)%\s*of\s*(\d+)/gi, (_,a,b)=>`${b}*${a}/100`);
    expr = expr.replace(/ans/gi, lastAns);
    if(isDeg){expr = expr.replace(/sin\(/g,'sin(pi/180*').replace(/cos\(/g,'cos(pi/180*').replace(/tan\(/g,'tan(pi/180*');}

    // Handle complex
    math.config({number: 'BigNumber', precision: 64});
    let result = math.evaluate(expr);
    lastAns = result;
    document.getElementById('display').value = math.format(result, {precision: 14});
    saveToHistory(expr, result);
    navigator.vibrate?.(50);
  }catch(e){alert('Error: '+e.message)}
}

function updateSlider(name, val){sliders[name]=parseFloat(val); document.getElementById(name+'Val').innerText=val; drawGraph();}

function drawGraph(){
  let func = document.getElementById('graphInput').value.replace(/a/g,sliders.a).replace(/b/g,sliders.b);
  let xValues = [], yValues = [];
  for(let x=-10; x<=10; x+=0.1){
    try{let y = math.evaluate(func, {x:x}); if(isFinite(y) && Math.abs(y) < 1000){ xValues.push(x); yValues.push(y); }}catch{}
  }
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('graphCanvas'), {
    type: 'line',
    data: {labels: xValues, datasets:[{label:func, data:yValues, borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,0.1)',tension:0.3, fill:true, pointRadius:0}]},
    options:{animation:{duration:300}, scales:{x:{grid:{color:'rgba(255,255,255,0.1)'}, ticks:{color:'#94a3b8'}},y:{grid:{color:'rgba(255,255,255,0.1)'}, ticks:{color:'#94a3b8'}}},plugins:{legend:{labels:{color:'#f1f5f9'}}}}
  });
}
function exportGraph(){
  const link = document.createElement('a');
  link.download = 'shana-graph.png';
  link.href = document.getElementById('graphCanvas').toDataURL();
  link.click();
}

// 3D GRAPHING WITH PLOTLY
function drawGraph3D(){
  let func = document.getElementById('graph3dInput').value || 'sin(sqrt(x^2+y^2))';
  let x = [], y = [], z = [];
  for(let i=-5; i<=5; i+=0.5){
    for(let j=-5; j<=5; j+=0.5){
      x.push(i); y.push(j);
      try{ z.push(math.evaluate(func, {x:i, y:j})); }catch{ z.push(0); }
    }
  }
  Plotly.newPlot('plotly3d', [{
    x:x, y:y, z:z, type:'surface',
    colorscale: [['0','#7c3aed'], ['1','#00d4ff']]
  }], {
    paper_bgcolor:'rgba(0,0,0,0)',
    plot_bgcolor:'rgba(0,0,0,0)',
    font:{color:'#f1f5f9'}
  });
}

// FULL CAS WITH NERDAMER
function smartCalc(){
  let q = document.getElementById('smartInput').value;
  let res = "Input: "+q+"\n\n";
  try{
    if(q.includes('derivative')){
      let expr = q.replace('derivative','').trim();
      res += nerdamer(`diff(${expr}, x)`).toString();
    }
    else if(q.includes('integral')){
      let expr = q.replace('integral','').trim();
      res += nerdamer(`integrate(${expr}, x)`).toString();
    }
    else if(q.includes('solve') && q.includes('{')){
      let expr = q.replace('solve','').trim();
      res += nerdamer.solveEquations(expr).toString();
    }
    else if(q.includes('solve')){
      let expr = q.replace('solve','').trim();
      res += nerdamer.solve(expr, 'x').toString();
    }
    else{
      res += nerdamer(q).evaluate().toString();
    }
  }catch(e){ res += "Error: "+e.message }
  document.getElementById('smartResult').innerText = res;
}

// UNIT CONVERTER WITH MATHJS UNITS
function convertUnit(){
  let q = document.getElementById('unitInput').value;
  try{
    let result = math.evaluate(q);
    document.getElementById('unitResult').innerText = `${q} = ${math.format(result, {precision: 6})}`;
  }catch(e){
    document.getElementById('unitResult').innerText = "Examples:\n5 kg to lb\n100 degC to degF\n10 m to ft\n50 USD to EUR";
  }
}

function calcLoan(){
  let P = parseFloat(document.getElementById('loanAmount').value);
  let r = parseFloat(document.getElementById('loanRate').value)/100/12;
  let n = parseFloat(document.getElementById('loanYears').value)*12;
  let payment = P * r / (1 - Math.pow(1+r, -n));
  document.getElementById('loanResult').innerText =
  `Monthly Payment: R${payment.toFixed(2)}\nTotal Paid: R${(payment*n).toFixed(2)}\nTotal Interest: R${(payment*n - P).toFixed(2)}`;
}

// FULL STEP SOLVER
function showSteps(){
  let eq = document.getElementById('stepInput').value;
  try{
    document.getElementById('stepResult').innerText = nerdamer.solve(eq, 'x').toString() + "\n\nSteps:\n" + nerdamer(eq).toString();
  }catch(e){
    document.getElementById('stepResult').innerText = "Error: Use format solve x^2-5x+6=0";
  }
}

function buildMatrix(){
  let html = '';
  for(let i=0; i<3; i++){
    html += '<tr>';
    for(let j=0; j<3; j++){
      html += `<td><input type="text" id="m${i}${j}" value="0" style="width:70px; background:rgba(0,0,0,0.8); color:#fff; border:1px solid rgba(255,255,255,0.1);"></td>`;
    }
    html += '</tr>';
  }
  document.getElementById('matrixTable').innerHTML = html;
}
function calcMatrix(){
  try{
    let m = [];
    for(let i=0; i<3; i++){m[i] = []; for(let j=0; j<3; j++){m[i][j] = math.complex(document.getElementById(`m${i}${j}`).value) || 0;}}
    let det = math.det(m);
    let inv = det === 0? "No inverse" : JSON.stringify(math.inv(m));
    document.getElementById('matrixResult').innerText =
    `Determinant: ${math.format(det)}\nInverse:\n${inv}`;
  }catch(e){document.getElementById('matrixResult').innerText = "Error: "+e.message;}
}

// STATS + REGRESSION
function calcStats(){
  let x = document.getElementById('statsInput').value.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  let y = document.getElementById('statsInputY').value.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  if(x.length===0) return alert("Enter X data");
  let mean = math.mean(x); let median = math.median(x); let sd = math.std(x);
  let res = `Count: ${x.length}\nMean: ${mean.toFixed(2)}\nMedian: ${median}\nStd Dev: ${sd.toFixed(2)}`;
  if(y.length === x.length){
    let n=x.length, sumX=math.sum(x), sumY=math.sum(y), sumXY=math.sum(x.map((v,i)=>v*y[i])), sumX2=math.sum(x.map(v=>v*v));
    let slope = (n*sumXY - sumX*sumY)/(n*sumX2 - sumX*sumX);
    let intercept = (sumY - slope*sumX)/n;
    res += `\n\nLinear Regression: y = ${slope.toFixed(3)}x + ${intercept.toFixed(3)}`;
  }
  document.getElementById('statsResult').innerText = res;
}

function saveToHistory(expr, result){
  let entry = {expr: expr || document.getElementById('display').value, result: result.toString(), time: new Date().toLocaleTimeString()};
  history.unshift(entry); if(history.length > 50) history.pop();
  localStorage.setItem('shanaHistory', JSON.stringify(history));
}
function loadHistory(){
  let html = history.map(h=>`${h.time}: ${h.expr} = ${h.result}`).join('\n');
  document.getElementById('historyList').innerText = html || 'No history yet';
}
function clearHistory(){history = []; localStorage.removeItem('shanaHistory'); loadHistory();}
function shareWhatsApp(){
  let text = `SHANA BEAST Result: ${document.getElementById('display').value}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

// VOICE INPUT
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'en-US';
  recognition.onresult = (e)=>{document.getElementById('display').value = e.results[0][0].transcript; calculate();}
  recognition.start();
}

document.getElementById('display').addEventListener('keypress', e=>{if(e.key==='Enter') calculate();})
</script>
