<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHANA CALC BEAST V9.7.2 - FIXED</title>
<style>
  :root{--bg:#050508;--card:rgba(17,17,25,0.7);--accent:#00d4ff;--text:#f1f5f9;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;}
  *{margin:0;padding:0;box-sizing:border-box;font-family: 'Inter', system-ui, sans-serif;}
  body{background:var(--bg); color:var(--text); padding:10px;}
.calc{max-width:1000px; margin:auto; background:var(--card); border-radius:24px; padding:20px; backdrop-filter:blur(20px);}
 h1{background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; font-size:20px;}
.subject-btn{padding:14px 18px; margin:6px 0; background: linear-gradient(135deg, #3b0764, #581c87); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700; width:100%; font-size:15px;}
.subject-btn.past{background: linear-gradient(135deg, #581c87, #8b5cf6);}
.btn{padding:12px 16px; background: linear-gradient(135deg, #00d4ff, #7c3aed); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700; margin:5px;}
.btn.red{background:#991b1b;}.btn.yellow{background:var(--yellow); color:#000;}.btn.orange{background:#f59e0b; color:#000;}
.paper-header{text-align:center; margin:15px 0; font-weight:700; white-space:pre-line; font-size:16px;}
.section-title{color:var(--accent); font-weight:800; margin-top:15px; margin-bottom:8px; text-align:center;}
.quiz-card{background:rgba(0,0,0,0.5); padding:16px; border-radius:12px; margin-bottom:12px;}
.quiz-option{padding:12px; margin:6px 0; background:#1f2937; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:0.2s;}
.quiz-option:hover{background:#374151;}
.quiz-option.correct{background:var(--green)!important; border-color:var(--green);}
.quiz-option.wrong{background:var(--red)!important; border-color:var(--red);}
.explanation{margin-top:10px; padding:10px; background:rgba(0,212,255,0.1); border-left:3px solid var(--accent); border-radius:6px; font-size:14px;}
.timer{font-size:20px; font-weight:800; color:var(--accent); text-align:center;}
.nav-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:5px; margin:10px 0; max-height:200px; overflow-y:auto;}
.nav-btn{padding:8px; background:#1f2937; border:none; border-radius:6px; color:#fff; cursor:pointer; font-size:12px;}
.nav-btn.done{background:#065f46;}.nav-btn.wrong{background:#7f1d1d;}.nav-btn.review{background:#f59e0b; color:#000;}
.nav-btn.current{border:2px solid var(--accent);}
.memo-section{margin-top:20px; padding:15px; background:#000; border-radius:12px; max-height:500px; overflow-y:auto;}
.progress{height:8px; background:#1f2937; border-radius:4px; margin:10px 0;}
.progress-bar{height:100%; background:var(--accent); border-radius:4px; transition:0.3s;}
.analytics-box{background:rgba(0,212,255,0.1); padding:12px; border-radius:8px; margin:10px 0; border-left:3px solid var(--accent);}
.section-divider{margin:20px 0 10px 0; padding:10px; background:rgba(139,92,246,0.2); border-radius:8px; text-align:center; font-weight:800; color:var(--purple);}
</style>
</head>
<body>
<div class="calc">
  <h1>SHANA CALC NATED V9.7.2 - FIXED</h1>

  <div id="menu">
    <h2 style="text-align:center; margin:15px 0;">PRACTICE MODE</h2>
    <button class="subject-btn" onclick="startPaper('hrm', 'random')">HRM N4 - Random 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('hrm', 'full')">HRM N4 - Mock Exam 100 Qs</button>
    <button class="subject-btn" onclick="startPaper('mc', 'random')">MC N4 - Random 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('mc', 'full')">MC N4 - Mock Exam 100 Qs</button>
    <button class="subject-btn" onclick="startPaper('ebm', 'random')">EBM N4 - Random 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('ebm', 'full')">EBM N4 - Mock Exam 100 Qs</button>

    <div class="section-divider">PAST EXAM PAPERS - DHET STYLE</div>
    <button class="subject-btn past" onclick="startPastPaper('hrm', '2019')">HRM N4 - Nov 2019 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('hrm', '2022')">HRM N4 - Jun 2022 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('hrm', '2024')">HRM N4 - Nov 2024 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('mc', '2019')">MC N4 - Nov 2019 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('mc', '2022')">MC N4 - Jun 2022 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('mc', '2024')">MC N4 - Nov 2024 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('ebm', '2019')">EBM N4 - Nov 2019 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('ebm', '2022')">EBM N4 - Jun 2022 Paper</button>
    <button class="subject-btn past" onclick="startPastPaper('ebm', '2024')">EBM N4 - Nov 2024 Paper</button>
  </div>

  <div id="examArea" style="display:none;">
    <div class="timer" id="timer">Time: 60:00</div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div id="navGrid" class="nav-grid"></div>
    <div id="paperTitle" class="paper-header"></div>
    <div id="questionsArea"></div>
    <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
      <button class="btn yellow" onclick="prevQ()">← Previous</button>
      <button class="btn orange" onclick="markReview()">🔖 Mark Review</button>
      <button class="btn" onclick="nextQ()">Next →</button>
    </div>
    <button class="btn" onclick="backToMenu()">← Back to Menu</button>
    <button class="btn red" id="submitBtn" onclick="submitPaper()">SUBMIT PAPER</button>
    <div id="memoArea" class="memo-section" style="display:none;"></div>
  </div>
</div>

<script>
let currentPaper=[], userAnswers=[], timer, timeLeft=3600, currentQ=0, selectedModule='', isPastPaper=false;

const papers = {
  hrm: {
    title: "PERSONNEL MANAGEMENT / HRM N4",
    bank: [
      {type:"MCQ", marks:1, q:"HRM stands for...", options:["A. Human Resource Management","B. Human Relations Management","C. Human Research Method","D. Human Rights Ministry"], ans:"A", exp:"HRM = Human Resource Management"},
      {type:"MCQ", marks:1, q:"Main goal of HRM?", options:["A. Reduce staff","B. Maximize employee performance","C. Increase costs","D. Avoid training"], ans:"B", exp:"HRM aims to maximize performance."},
      {type:"DEF", marks:2, q:"Define 'Human Resource Management'.", ans:"Strategic management of human resources to achieve organizational objectives", keywords:["strategic","management","human","resources","organizational","objectives"]},
      {type:"APP", marks:4, q:"Explain TWO advantages of internal recruitment.", ans:"1. Motivates employees 2. Cheaper and faster", keywords:["motivates","employees","cheaper","faster"]}
    ],
    past: {
      '2019': [{type:"MCQ", marks:1, q:"[2019 Q1] Which Act governs minimum wage?", options:["A. LRA","B. BCEA","C. EEA","D. OHSA"], ans:"B", exp:"BCEA sets basic conditions."}],
      '2022': [{type:"MCQ", marks:1, q:"[2022 Q1] Performance appraisal is done to...", options:["A. Fire staff","B. Evaluate performance","C. Recruit","D. Train"], ans:"B", exp:"Evaluate performance."}],
      '2024': [{type:"MCQ", marks:1, q:"[2024 Q1] OHSA deals with...", options:["A. Wages","B. Health and Safety","C. Equity","D. Contracts"], ans:"B", exp:"Occupational Health and Safety."}]
    }
  },
  mc: {
    title: "MANAGEMENT COMMUNICATION N4",
    bank: [
      {type:"MCQ", marks:1, q:"Communication involves...", options:["A. 1 person","B. Sender and receiver","C. Only writing","D. Only speaking"], ans:"B", exp:"Needs sender and receiver."}
    ],
    past: {
      '2019': [{type:"MCQ", marks:1, q:"[2019 Q1] Minutes are...", options:["A. Agenda","B. Record of meeting","C. Report","D. Memo"], ans:"B", exp:"Official record."}],
      '2022': [{type:"APP", marks:4, q:"[2022 Q1] Explain TWO types of reports.", ans:"1. Informational 2. Analytical", keywords:["informational","analytical"]}],
      '2024': [{type:"MCQ", marks:1, q:"[2024 Q1] Business letter must be...", options:["A. Long","B. Clear","C. Funny","D. Late"], ans:"B", exp:"Clear and concise."}]
    }
  },
  ebm: {
    title: "ENTREPRENEUR & BUSINESS MANAGEMENT N4",
    bank: [
      {type:"MCQ", marks:1, q:"Entrepreneur is...", options:["A. Employee","B. Risk taker","C. Customer","D. Supplier"], ans:"B", exp:"Entrepreneur takes risk."}
    ],
    past: {
      '2019': [{type:"MCQ", marks:1, q:"[2019 Q1] 4th factor of production?", options:["A. Money","B. Entrepreneurship","C. Product","D. Service"], ans:"B", exp:"Land Labour Capital Entrepreneurship."}],
      '2022': [{type:"APP", marks:4, q:"[2022 Q1] Explain TWO characteristics of entrepreneur.", ans:"1. Risk taker 2. Innovative", keywords:["risk","innovative"]}],
      '2024': [{type:"MCQ", marks:1, q:"[2024 Q1] SWOT stands for...", options:["A. Sales","B. Strengths Weaknesses Opportunities Threats","C. Stock","D. Service"], ans:"B", exp:"SWOT analysis."}]
    }
  }
};

setInterval(()=>{ if(currentPaper.length > 0){ localStorage.setItem('shana_progress', JSON.stringify({currentPaper, userAnswers, currentQ, timeLeft, selectedModule, isPastPaper})); } }, 5000);
window.onload = ()=>{ try{ let saved = localStorage.getItem('shana_progress'); if(saved && confirm("Resume your last exam?")){ let data = JSON.parse(saved); currentPaper=data.currentPaper; userAnswers=data.userAnswers; currentQ=data.currentQ; timeLeft=data.timeLeft; selectedModule=data.selectedModule; isPastPaper=data.isPastPaper; document.getElementById('menu').style.display = 'none'; document.getElementById('examArea').style.display = 'block'; document.getElementById('paperTitle').innerText = `${papers[selectedModule].title}\nTOTAL: ${currentPaper.reduce((a,b)=>a+b.marks,0)} MARKS ${isPastPaper?'- PAST PAPER':''}`; buildNav(); showQuestion(); timer = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0) submitPaper(); },1000); }catch(e){console.log(e)} }

function getRandomQuestions(bank, count){ let result = []; while(result.length < count){ let shuffled = [...bank].sort(()=>Math.random()-0.5); result = result.concat(shuffled); } return result.slice(0, count); }

function startPaper(mod, mode){
  isPastPaper = false; localStorage.removeItem('shana_progress');
  selectedModule = mod; let bank = papers[mod].bank;
  let questionCount = mode==='random'? 10 : 100;
  currentPaper = getRandomQuestions(bank, questionCount);
  userAnswers = new Array(currentPaper.length).fill(null); currentQ = 0; timeLeft = 3600;
  document.getElementById('menu').style.display = 'none'; document.getElementById('examArea').style.display = 'block';
  document.getElementById('paperTitle').innerText = `${papers[mod].title}\nTOTAL: ${currentPaper.reduce((a,b)=>a+b.marks,0)} MARKS`;
  buildNav(); showQuestion();
  clearInterval(timer); timer = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0) submitPaper(); },1000);
}

function startPastPaper(mod, year){
  isPastPaper = true; localStorage.removeItem('shana_progress');
  selectedModule = mod; currentPaper = papers[mod].past[year];
  userAnswers = new Array(currentPaper.length).fill(null); currentQ = 0; timeLeft = 1800;
  document.getElementById('menu').style.display = 'none'; document.getElementById('examArea').style.display = 'block';
  document.getElementById('paperTitle').innerText = `${papers[mod].title}\nPAST PAPER: ${year} - TOTAL: ${currentPaper.reduce((a,b)=>a+b.marks,0)} MARKS`;
  buildNav(); showQuestion();
  clearInterval(timer); timer = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0) submitPaper(); },1000);
}

function updateTimer(){ let m = Math.floor(timeLeft/60), s = timeLeft%60; document.getElementById('timer').innerText = `Time: ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function buildNav(){ let html=''; currentPaper.forEach((_,i)=>{ html+=`<button class="nav-btn" id="nav${i}" onclick="goToQ(${i})">${i+1}</button>`; }); document.getElementById('navGrid').innerHTML=html; updateNav(); }
function updateNav(){
  currentPaper.forEach((_,i)=>{
    let btn=document.getElementById(`nav${i}`);
    if(!btn) return;
    if(!btn.classList.contains('review')){
      btn.classList.remove('current','done','wrong');
      if(i===currentQ) btn.classList.add('current');
      if(userAnswers[i]!==null){
        if(currentPaper[i].type==="MCQ" && userAnswers[i]===currentPaper[i].ans) btn.classList.add('done');
        else if(currentPaper[i].type==="MCQ") btn.classList.add('wrong');
        else btn.classList.add('done');
      }
    }
  }); // FIXED: CLOSED THIS
  let progress = (userAnswers.filter(a=>a!==null).length/currentPaper.length)*100;
  document.getElementById('progressBar').style.width=progress+'%';
}
function showQuestion(){ let q = currentPaper[currentQ]; let html = `<div class="quiz-card">`; if(q.type==="MCQ") html += `<div class="section-title">SECTION A: MULTIPLE CHOICE</div>`; if(q.type==="DEF") html += `<div class="section-title">SECTION B: DEFINITIONS</div>`; if(q.type==="APP") html += `<div class="section-title">SECTION C: APPLICATION</div>`; html += `<p><b>Question ${currentQ+1} of ${currentPaper.length}.</b> ${q.q} [${q.marks}]</p>`; if(q.type==="MCQ"){ q.options.forEach(opt=>{ let letter = opt.charAt(0); let selected = userAnswers[currentQ]===letter?'style="border-color:var(--accent)"':''; html += `<div class="quiz-option" ${selected} onclick="checkMCQ(this, '${letter}')">${opt}</div>`; }); } else { html += `<textarea id="txt${currentQ}" rows="4" style="width:100%; background:#000; color:#fff; border:1px solid #333; border-radius:8px; padding:10px;">${userAnswers[currentQ]||''}</textarea>`; } html += `</div>`; document.getElementById('questionsArea').innerHTML = html; updateNav(); }
function checkMCQ(el, choice){ userAnswers[currentQ] = choice; document.querySelectorAll('.quiz-option').forEach(o=>o.style.pointerEvents='none'); let correct = currentPaper[currentQ].ans; if(choice === correct){ el.classList.add('correct'); } else { el.classList.add('wrong'); document.querySelectorAll('.quiz-option').forEach(o=>{ if(o.textContent.startsWith(correct)) o.classList.add('correct'); }); } if(currentPaper[currentQ].exp){ document.querySelector('.quiz-card').innerHTML += `<div class="explanation"><b>Explanation:</b> ${currentPaper[currentQ].exp}</div>`; } updateNav(); setTimeout(()=>{ if(currentQ<currentPaper.length-1) nextQ(); }, 1500); }
function markReview(){ document.getElementById(`nav${currentQ}`).classList.add('review'); }
function nextQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ<currentPaper.length-1) currentQ++; showQuestion(); }
function prevQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ>0) currentQ--; showQuestion(); }
function goToQ(i){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; currentQ=i; showQuestion(); }
function backToMenu(){ clearInterval(timer); localStorage.removeItem('shana_progress'); document.getElementById('examArea').style.display='none'; document.getElementById('menu').style.display='block'; }
function gradeTextAnswer(userAns, keywords){ if(!userAns) return 0; let lower = userAns.toLowerCase(); let hits = keywords.filter(k=>lower.includes(k)).length; return Math.min(1, hits/keywords.length); }

function submitPaper(){
  clearInterval(timer); localStorage.removeItem('shana_progress');
  if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`)?.value;
  document.getElementById('submitBtn').style.display = 'none'; document.getElementById('questionsArea').innerHTML = ''; document.getElementById('navGrid').innerHTML = '';
  let score=0, total=0; let topicStats = {MCQ:0, DEF:0, APP:0, MCQ_Total:0, DEF_Total:0, APP_Total:0};
  currentPaper.forEach((q,i)=>{ total += q.marks; let userAns = userAnswers[i]; let marksAwarded = q.type==="MCQ"? (userAns===q.ans? q.marks : 0) : Math.round(q.marks * gradeTextAnswer(userAns, q.keywords)); score += marksAwarded;
    if(q.type==="MCQ") topicStats.MCQ_Total++; if(q.type==="DEF") topicStats.DEF_Total++; if(q.type==="APP") topicStats.APP_Total++;
    if(marksAwarded > 0){ if(q.type==="MCQ") topicStats.MCQ++; if(q.type==="DEF") topicStats.DEF++; if(q.type==="APP") topicStats.APP++; }
  });
  let percent = Math.round((score/total)*100); let mcqPer = Math.round((topicStats.MCQ/topicStats.MCQ_Total)*100) || 0; let defPer = Math.round((topicStats.DEF/topicStats.DEF_Total)*100) || 0; let appPer = Math.round((topicStats.APP/topicStats.APP_Total)*100) || 0; let weakest = mcqPer<defPer&&mcqPer<appPer?'Section A: MCQ':defPer<appPer?'Section B: DEF':'Section C: APP';
  let memoHTML = `<h2>FINAL: ${score}/${total} = ${percent}% - ${percent>=50?'PASS':'FAIL'} ${isPastPaper?'(PAST PAPER)':''}</h2>`;
  memoHTML += `<div class="analytics-box"><h3>PERFORMANCE BREAKDOWN</h3><div>Section A MCQ: ${mcqPer}%</div><div>Section B DEF: ${defPer}%</div><div>Section C APP: ${appPer}%</div><div style="margin-top:8px; color:var(--yellow)">⚠️ Focus more on: ${weakest}</div></div>`;
  currentPaper.forEach((q,i)=>{ let correctText = q.type==="MCQ"? q.options.find(o=>o.startsWith(q.ans)) : q.ans; memoHTML += `<div style="margin-bottom:15px;"><b>Q${i+1}.</b> ${q.q}<br><b>Your:</b> ${userAnswers[i] || 'No Answer'}<br><div style="color:var(--green)"><b>Memo:</b> ${correctText}</div></div>`; });
  document.getElementById('memoArea').innerHTML = memoHTML; document.getElementById('memoArea').style.display = 'block'; document.getElementById('timer').innerText = 'EXAM COMPLETED';
} // FIXED: CLOSED THIS
</script>
</body>
</html>
