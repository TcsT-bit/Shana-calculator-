<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHANA CALC BEAST V5.2 NATED PRO</title>
<style>
  :root{--bg:#050508;--card:rgba(17,17,25,0.7);--accent:#00d4ff;--text:#f1f5f9;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;}
  *{margin:0;padding:0;box-sizing:border-box;font-family: 'Inter', system-ui, sans-serif;}
  body{background:var(--bg); color:var(--text); padding:10px;}
.calc{max-width:900px; margin:auto; background:var(--card); border-radius:24px; padding:20px; backdrop-filter:blur(20px);}
 h1{background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center;}
.subject-btn{padding:12px 18px; margin:5px; background: linear-gradient(135deg, #3b0764, #581c87); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700;}
.btn{padding:10px 16px; background: linear-gradient(135deg, #00d4ff, #7c3aed); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700; margin:5px;}
.btn.red{background:#991b1b;}.btn.yellow{background:var(--yellow); color:#000;}
.paper-header{text-align:center; margin:15px 0; font-weight:700; white-space:pre-line;}
.section-title{color:var(--accent); font-weight:800; margin-top:15px; margin-bottom:8px;}
.quiz-card{background:rgba(0,0,0,0.5); padding:16px; border-radius:12px; margin-bottom:12px;}
.quiz-option{padding:10px; margin:6px 0; background:#1f2937; border-radius:8px; cursor:pointer; border:2px solid transparent;}
.quiz-option:hover{background:#374151;}
.quiz-option.correct{background:var(--green)!important; border-color:var(--green);}
.quiz-option.wrong{background:var(--red)!important; border-color:var(--red);}
.timer{font-size:20px; font-weight:800; color:var(--accent); text-align:center;}
.nav-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:5px; margin:10px 0;}
.nav-btn{padding:8px; background:#1f2937; border:none; border-radius:6px; color:#fff; cursor:pointer;}
.nav-btn.done{background:#065f46;}
.nav-btn.current{border:2px solid var(--accent);}
.memo-section{margin-top:20px; padding:15px; background:#000; border-radius:12px;}
.progress{height:8px; background:#1f2937; border-radius:4px; margin:10px 0;}
.progress-bar{height:100%; background:var(--accent); border-radius:4px; transition:0.3s;}
</style>
</head>
<body>
<div class="calc">
  <h1>SHANA CALC NATED V5.2 PRO</h1>

  <div id="menu">
    <h2 style="text-align:center; margin:15px 0;">Select Module</h2>
    <button class="subject-btn" onclick="startPaper('hrm')">Personnel Management N4</button>
    <button class="subject-btn" onclick="startPaper('mc')">Management Communication N4</button>
    <button class="subject-btn" onclick="startPaper('ebm')">Entrepreneur & Business Mgmt N4</button>
  </div>

  <div id="examArea" style="display:none;">
    <div class="timer" id="timer">Time: 60:00</div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div id="navGrid" class="nav-grid"></div>
    <div id="paperTitle" class="paper-header"></div>
    <div id="questionsArea"></div>
    <div style="display:flex; justify-content:space-between;">
      <button class="btn yellow" onclick="prevQ()">← Previous</button>
      <button class="btn" onclick="nextQ()">Next →</button>
    </div>
    <button class="btn red" id="submitBtn" onclick="submitPaper()">SUBMIT PAPER</button>
    <div id="memoArea" class="memo-section" style="display:none;"></div>
  </div>
</div>

<script>
let currentPaper=[], userAnswers=[], timer, timeLeft=3600, currentQ=0, selectedModule='';

// FIXED: Define all 3 separately first
const papers = {
  hrm: {
    title: "PERSONNEL MANAGEMENT / HRM N4\nTOTAL: 20 MARKS",
    questions: [
      {type:"MCQ", marks:1, q:"The process of attracting suitable candidates for a job is called...", options:["A. Selection","B. Recruitment","C. Induction","D. Training"], ans:"B"},
      {type:"MCQ", marks:1, q:"Which document contains the duties and responsibilities of a job?", options:["A. Employment contract","B. Job specification","C. Job description","D. CV"], ans:"C"},
      {type:"MCQ", marks:1, q:"The first step in the selection process is...", options:["A. Interview","B. Screening of applications","C. Medical test","D. Reference check"], ans:"B"},
      {type:"MCQ", marks:1, q:"Training employees while they are doing their job is called...", options:["A. Off-the-job training","B. Induction","C. On-the-job training","D. Orientation"], ans:"C"},
      {type:"DEF", marks:2, q:"Define 'Human Resource Management'.", ans:"Human Resource Management is the process of recruiting, training, developing and managing employees to achieve organizational objectives.", keywords:["recruiting","training","managing","employees","objectives"]},
      {type:"DEF", marks:2, q:"State TWO purposes of an employment interview.", ans:"1. To assess the candidate's suitability for the job 2. To provide information about the job and company to the candidate", keywords:["assess","suitability","information"]},
      {type:"DEF", marks:2, q:"What is 'Induction'?", ans:"Induction is the process of introducing a new employee to the organization, job and colleagues.", keywords:["introducing","new employee","organization"]},
      {type:"APP", marks:4, q:"Explain TWO differences between recruitment and selection.", ans:"1. Recruitment is attracting candidates, Selection is choosing the best candidate. 2. Recruitment increases the applicant pool, Selection reduces it.", keywords:["attracting","choosing","pool"]},
      {type:"APP", marks:4, q:"Describe TWO benefits of training employees.", ans:"1. Increased productivity and efficiency 2. Improved quality of work and reduced errors", keywords:["productivity","efficiency","quality"]},
      {type:"APP", marks:2, q:"Name TWO sources of recruitment.", ans:"1. Internal - Promotions 2. External - Job advertisements", keywords:["internal","external"]}
    ]
  },
  mc: {
    title: "MANAGEMENT COMMUNICATION N4\nTOTAL: 20 MARKS",
    questions: [
      {type:"MCQ", marks:1, q:"The exchange of information between two or more people is called...", options:["A. Feedback","B. Noise","C. Communication","D. Channel"], ans:"C"},
      {type:"MCQ", marks:1, q:"Which is an example of non-verbal communication?", options:["A. Email","B. Body language","C. Phone call","D. Memo"], ans:"B"},
      {type:"MCQ", marks:1, q:"A list of items to be discussed at a meeting is called...", options:["A. Minutes","B. Agenda","C. Report","D. Notice"], ans:"B"},
      {type:"MCQ", marks:1, q:"Which is a barrier to communication?", options:["A. Clarity","B. Noise","C. Feedback","D. Channel"], ans:"B"},
      {type:"DEF", marks:2, q:"Define 'Feedback' in communication.", ans:"Feedback is the receiver's response to the sender's message which shows if the message was understood.", keywords:["receiver","response","message","understood"]},
      {type:"DEF", marks:2, q:"What are 'Minutes' of a meeting?", ans:"Minutes are the official written record of what was discussed and decided at a meeting.", keywords:["official","written","record","discussed","decided"]},
      {type:"DEF", marks:2, q:"State TWO principles of business writing.", ans:"1. Clarity 2. Conciseness", keywords:["clarity","conciseness"]},
      {type:"APP", marks:4, q:"Explain TWO types of business reports.", ans:"1. Progress report - reports on work done 2. Financial report - reports on money matters", keywords:["progress","financial","report"]},
      {type:"APP", marks:4, q:"Describe TWO importance of meetings.", ans:"1. To make decisions 2. To share information", keywords:["decisions","information","share"]},
      {type:"APP", marks:2, q:"Name TWO types of communication channels.", ans:"1. Verbal 2. Written", keywords:["verbal","written"]}
    ]
  },
  ebm: {
    title: "ENTREPRENEUR & BUSINESS MANAGEMENT N4\nTOTAL: 20 MARKS",
    questions: [
      {type:"MCQ", marks:1, q:"A person who starts a business and takes risks is called...", options:["A. Manager","B. Entrepreneur","C. Employee","D. Investor"], ans:"B"},
      {type:"MCQ", marks:1, q:"Which is NOT a factor of production?", options:["A. Land","B. Labour","C. Capital","D. Product"], ans:"D"},
      {type:"MCQ", marks:1, q:"A document outlining business goals is called...", options:["A. Invoice","B. Business plan","C. CV","D. Contract"], ans:"B"},
      {type:"MCQ", marks:1, q:"Which is a type of business ownership?", options:["A. Salary","B. Sole Proprietor","C. Marketing","D. Production"], ans:"B"},
      {type:"DEF", marks:2, q:"Define 'Market Research'.", ans:"Market research is gathering information about customers, competitors and market trends.", keywords:["gathering","information","customers","competitors","market"]},
      {type:"DEF", marks:2, q:"What is 'Break-even point'?", ans:"Break-even point is where total revenue equals total costs.", keywords:["revenue","costs","equals"]},
      {type:"DEF", marks:2, q:"State TWO characteristics of an entrepreneur.", ans:"1. Risk taker 2. Innovative", keywords:["risk","innovative"]},
      {type:"APP", marks:4, q:"Explain TWO sources of business finance.", ans:"1. Bank loan 2. Personal savings", keywords:["bank","loan","savings"]},
      {type:"APP", marks:4, q:"Describe TWO factors to consider when choosing business location.", ans:"1. Near target market 2. Affordable rent", keywords:["market","rent","location"]},
      {type:"APP", marks:2, q:"Name TWO types of business.", ans:"1. Retail 2. Manufacturing", keywords:["retail","manufacturing"]}
    ]
  }
};

function startPaper(mod){
  selectedModule = mod;
  currentPaper = papers[mod].questions;
  userAnswers = new Array(currentPaper.length).fill(null);
  currentQ = 0; timeLeft = 3600;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('examArea').style.display = 'block';
  document.getElementById('paperTitle').innerText = papers[mod].title;
  document.getElementById('memoArea').style.display = 'none';

  buildNav();
  showQuestion();
  timer = setInterval(()=>{
    timeLeft--;
    let m = Math.floor(timeLeft/60), s = timeLeft%60;
    document.getElementById('timer').innerText = `Time: ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if(timeLeft<=0) submitPaper();
  },1000);
}

function buildNav(){
  let html='';
  currentPaper.forEach((_,i)=>{
    html+=`<button class="nav-btn" id="nav${i}" onclick="goToQ(${i})">${i+1}</button>`;
  });
  document.getElementById('navGrid').innerHTML=html;
}

function updateNav(){
  currentPaper.forEach((_,i)=>{
    let btn=document.getElementById(`nav${i}`);
    btn.classList.remove('current','done');
    if(i===currentQ) btn.classList.add('current');
    if(userAnswers[i]!==null) btn.classList.add('done');
  });
  let progress = (userAnswers.filter(a=>a!==null).length/currentPaper.length)*100;
  document.getElementById('progressBar').style.width=progress+'%';
}

function showQuestion(){
  let q = currentPaper[currentQ];
  let html = `<div class="quiz-card">`;

  if(q.type==="MCQ" && currentQ===0) html += `<div class="section-title">SECTION A: MULTIPLE CHOICE [4 x 1 = 4]</div>`;
  if(q.type==="DEF" && currentPaper[currentQ-1]?.type!=="DEF") html += `<div class="section-title">SECTION B: DEFINITIONS [6]</div>`;
  if(q.type==="APP" && currentPaper[currentQ-1]?.type!=="APP") html += `<div class="section-title">SECTION C: APPLICATION [10]</div>`;

  html += `<p><b>Question ${currentQ+1}.</b> ${q.q} [${q.marks}]</p>`;

  if(q.type==="MCQ"){
    q.options.forEach(opt=>{
      let letter = opt.charAt(0);
      let selected = userAnswers[currentQ]===letter?'style="border-color:var(--accent)"':'';
      html += `<div class="quiz-option" ${selected} onclick="checkMCQ(this, '${letter}')">${opt}</div>`;
    });
  } else {
    html += `<textarea id="txt${currentQ}" rows="4" style="width:100%; background:#000; color:#fff; border:1px solid #333; border-radius:8px; padding:10px; font-size:16px;" placeholder="Type your answer here...">${userAnswers[currentQ]||''}</textarea>`;
  }
  html += `</div>`;
  document.getElementById('questionsArea').innerHTML = html;
  updateNav();
}

function checkMCQ(el, choice){
  userAnswers[currentQ] = choice;
  document.querySelectorAll('.quiz-option').forEach(o=>o.style.pointerEvents='none');
  let correct = currentPaper[currentQ].ans;
  if(choice === correct){ el.classList.add('correct'); } 
  else {
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(o=>{ if(o.textContent.startsWith(correct)) o.classList.add('correct'); });
  }
  setTimeout(()=>{ if(currentQ<currentPaper.length-1) nextQ(); }, 800);
}

function nextQ(){
  if(currentPaper[currentQ].type!=="MCQ"){
    userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value;
  }
  if(currentQ<currentPaper.length-1) currentQ++;
  showQuestion();
}

function prevQ(){
  if(currentPaper[currentQ].type!=="MCQ"){
    userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value;
  }
  if(currentQ>0) currentQ--;
  showQuestion();
}

function goToQ(i){
  if(currentPaper[currentQ].type!=="MCQ"){
    userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value;
  }
  currentQ=i; showQuestion();
}

function gradeTextAnswer(userAns, keywords){
  if(!userAns) return 0;
  let lower = userAns.toLowerCase();
  let hits = keywords.filter(k=>lower.includes(k)).length;
  return Math.min(1, hits/keywords.length);
}

function submitPaper(){
  clearInterval(timer);
  if(currentPaper[currentQ].type!=="MCQ"){
    userAnswers[currentQ] = document.getElementById(`txt${currentQ}`)?.value;
  }
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('questionsArea').innerHTML = '';
  document.getElementById('navGrid').innerHTML = '';

  let score=0, total=0, memoHTML=`<h2>MEMORANDUM + RESULTS</h2>`;

  currentPaper.forEach((q,i)=>{
    total += q.marks;
    let userAns = userAnswers[i];
    let marksAwarded = 0;

    if(q.type==="MCQ"){
      marksAwarded = userAns===q.ans? q.marks : 0;
    } else {
      let percent = gradeTextAnswer(userAns, q.keywords);
      marksAwarded = Math.round(q.marks * percent);
    }
    score += marksAwarded;

    let correctText = q.type==="MCQ"? q.options.find(o=>o.startsWith(q.ans)) : q.ans;

    memoHTML += `<div class="memo-q" style="margin-bottom:15px;">
      <b>Q${i+1}. [${q.marks}]</b> ${q.q}<br>
      <b>Your Answer:</b> ${userAns || 'No Answer'}<br>
      <div style="color:var(--green)"><b>Correct Answer:</b> ${correctText}</div>
      <b>Marks:</b> ${marksAwarded}/${q.marks}
    </div>`;
  });

  let percent = Math.round((score/total)*100);
  memoHTML = `<h2>FINAL: ${score}/${total} = ${percent}% - ${percent>=50?'PASS':'FAIL'}</h2><hr>` + memoHTML;

  document.getElementById('memoArea').innerHTML = memoHTML;
  document.getElementById('memoArea').style.display = 'block';
  document.getElementById('timer').innerText = 'EXAM COMPLETED';
}
</script>
</body>
</html>
