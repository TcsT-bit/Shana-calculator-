<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SHANA CALC - Tesla UI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.1/math.min.js"></script>
<style>
  :root{
    --bg: #050508;
    --card: rgba(17,17,25,0.6);
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --btn: rgba(31,41,55,0.7);
    --btn-hover: rgba(55,65,81,0.9);
    --glow: 0 0 20px rgba(0,212,255,0.4);
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;}
  body{
    background: radial-gradient(1200px 800px at 80% -10%, #00d4ff22, transparent),
                radial-gradient(800px 600px at 20% 110%, #7c3aed22, transparent),
                var(--bg);
    color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:10px;
    overflow-x:hidden;
  }
.calc{
    width:100%; max-width:1300px; background:var(--card);
    border:1px solid rgba(255,255,255,0.1); border-radius:32px; padding:24px;
    backdrop-filter: blur(20px); box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn{ from{opacity:0; transform: translateY(20px);} to{opacity:1; transform: translateY(0);} }

.header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px;}
.header h1{
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    font-size:32px; font-weight:900; letter-spacing:-1px;
    text-shadow: 0 0 30px rgba(0,212,255,0.3);
  }
.tabs{display:flex; gap:10px; flex-wrap:wrap; overflow-x:auto; padding-bottom:5px;}
.tab{
    padding:10px 18px; background:var(--btn); border-radius:14px; cursor:pointer;
    border:1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; font-weight:600;
    backdrop-filter: blur(10px); white-space:nowrap; flex-shrink:0;
  }
.tab:hover{transform: translateY(-2px); box-shadow: var(--glow);}
.tab.active{
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color:var(--accent); box-shadow: var(--glow);
  }

.panel{
    background:rgba(13,13,18,0.7); border:1px solid rgba(255,255,255,0.1);
    border-radius:20px; padding:20px; backdrop-filter: blur(10px);
  }
  #display{
    width:100%; background:rgba(0,0,0,0.8); color:var(--text); font-size:40px;
    padding:20px; border-radius:16px; border:1px solid rgba(0,212,255,0.3);
    text-align:right; margin-bottom:16px; font-weight:700;
    box-shadow: inset 0 0 20px rgba(0,212,255,0.1); transition:0.3s;
  }
  #display:focus{outline:none; border-color:var(--accent); box-shadow: 0 0 30px rgba(0,212,255,0.3);}

.btn-grid{display:grid; grid-template-columns: repeat(6,1fr); gap:10px;} /* 6 cols for scientific */
.btn{
    padding:14px; background:var(--btn); border:none; color:var(--text);
    border-radius:14px; font-size:16px; cursor:pointer; transition: all 0.2s ease;
    border:1px solid rgba(255,255,255,0.05); font-weight:600;
    backdrop-filter: blur(10px); touch-action: manipulation;
  }
.btn:hover{background:var(--btn-hover); transform: translateY(-3px) scale(1.02); box-shadow: var(--glow);}
.btn:active{transform: scale(0.95);}
.btn.op{background: linear-gradient(135deg, #3b0764, #581c87);}
.btn.eq{background: linear-gradient(135deg, var(--accent), var(--accent2)); font-weight:800; box-shadow: var(--glow);}
.btn.green{background: linear-gradient(135deg, #065f46, #047857);}
.btn.sci{background: linear-gradient(135deg, #1e3a8a, #3730a3); font-size:14px;}

  canvas{background:rgba(0,0,0,0.8); border-radius:16px; width:100%!important; height:350px!important; border:1px solid rgba(0,212,255,0.2);}
.steps{
    background:rgba(0,0,0,0.8); padding:16px; border-radius:14px; font-family:'Fira Code', monospace;
    font-size:14px; max-height:300px; overflow:auto; color:#22c55e; border:1px solid rgba(34,197,94,0.3);
  }
  input[type="text"]{
    width:100%; padding:14px; background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.1);
    border-radius:12px; color:var(--text); margin-bottom:12px; font-size:16px;
    transition:0.3s;
  }
  input[type="text"]:focus{outline:none; border-color:var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.2);}
.history{max-height:200px; overflow:auto; font-size:13px; color:var(--muted);}
  table{width:100%; border-collapse:collapse; font-size:14px;}
  td, th{border:1px solid rgba(255,255,255,0.1); padding:8px; text-align:center;}

  @media(max-width: 768px){
    body{padding:8px;}
  .calc{padding:16px; border-radius:24px;}
  .header h1{font-size:24px;}
    #display{font-size:28px; padding:16px;}
  .btn{padding:12px; font-size:14px;}
  .btn-grid{gap:6px; grid-template-columns: repeat(5,1fr);} /* 5 cols on mobile */
  .tabs{gap:8px;}
    canvas{height:250px!important;}
  }

  #installBanner{
    display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background: linear-gradient(135deg, var(--accent), var(--accent2)); padding:14px 24px;
    border-radius:16px; box-shadow: var(--glow); z-index:9999; cursor:pointer; font-weight:700;
    color:#fff; border:none;
  }
</style>
</head>
<body>
<div id="installBanner" onclick="installPWA()">📲 Install SHANA CALC</div>

<div class="calc">
  <div class="header">
    <h1>SHANA CALC</h1>
    <div class="tabs">
      <div class="tab active" onclick="switchTab(event, 'basic')">Basic</div>
      <div class="tab" onclick="switchTab(event, 'graph')">Graph</div>
      <div class="tab" onclick="switchTab(event, 'smart')">Smart AI</div>
      <div class="tab" onclick="switchTab(event, 'finance')">Finance</div>
      <div class="tab" onclick="switchTab(event, 'steps')">Steps</div>
      <div class="tab" onclick="switchTab(event, 'matrix')">Matrix</div>
      <div class="tab" onclick="switchTab(event, 'stats')">Stats</div>
      <div class="tab" onclick="switchTab(event, 'history')">History</div>
    </div>
  </div>

  <div id="basic" class="tab-content">
    <input type="text" id="display" placeholder="Type: 15% of 200 or sin(45) or 5kg to lb">
    <div style="display:flex; gap:10px; margin-bottom:12px; flex-wrap:wrap;">
      <button class="btn green" onclick="shareWhatsApp()">📲 Share to WhatsApp</button>
      <button class="btn" onclick="saveToHistory()">💾 Save</button>
      <button class="btn" onclick="toggleDegRad()">DEG: <span id="degRad">DEG</span></button>
    </div>
    <div class="btn-grid">
      <!-- SCIENTIFIC ROW -->
      <button class="btn sci" onclick="add('sin(')">sin</button>
      <button class="btn sci" onclick="add('cos(')">cos</button>
      <button class="btn sci" onclick="add('tan(')">tan</button>
      <button class="btn sci" onclick="add('log(')">log</button>
      <button class="btn sci" onclick="add('ln(')">ln</button>
      <button class="btn sci" onclick="add('sqrt(')">√</button>

      <button class="btn sci" onclick="add('asin(')">asin</button>
      <button class="btn sci" onclick="add('acos(')">acos</button>
      <button class="btn sci" onclick="add('atan(')">atan</button>
      <button class="btn sci" onclick="add('10^')">10^x</button>
      <button class="btn sci" onclick="add('e^')">e^x</button>
      <button class="btn sci" onclick="add('!')">x!</button>

      <button class="btn" onclick="clearDisplay()">C</button>
      <button class="btn" onclick="del()">DEL</button>
      <button class="btn op" onclick="add(')">(</button>
      <button class="btn op" onclick="add(')')">)</button>
      <button class="btn op" onclick="add('/')">÷</button>
      <button class="btn op" onclick="add('^')">x^y</button>

      <button class="btn" onclick="add('7')">7</button>
      <button class="btn" onclick="add('8')">8</button>
      <button class="btn" onclick="add('9')">9</button>
      <button class="btn op" onclick="add('*')">×</button>
      <button class="btn op" onclick="add('pi')">π</button>
      <button class="btn op" onclick="add('e')">e</button>

      <button class="btn" onclick="add('4')">4</button>
      <button class="btn" onclick="add('5')">5</button>
      <button class="btn" onclick="add('6')">6</button>
      <button class="btn op" onclick="add('-')">-</button>
      <button class="btn op" onclick="add('%')">%</button>
      <button class="btn op" onclick="add('abs(')">|x|</button>

      <button class="btn" onclick="add('1')">1</button>
      <button class="btn" onclick="add('2')">2</button>
      <button class="btn" onclick="add('3')">3</button>
      <button class="btn op" onclick="add('+')">+</button>
      <button class="btn op" onclick="add('to')">to</button>
      <button class="btn op" onclick="add('ans')">ANS</button>

      <button class="btn" onclick="add('0')">0</button>
      <button class="btn" onclick="add('.')">.</button>
      <button class="btn" colspan="2" style="grid-column: span 2;" onclick="add('00')">00</button>
      <button class="btn eq" colspan="2" style="grid-column: span 2;" onclick="calculate()">=</button>
    </div>
  </div>

  <div id="graph" class="tab-content" style="display:none;">
    <input type="text" id="graphInput" placeholder="Enter function: x^2 + 3x - 5">
    <button class="btn eq" onclick="drawGraph()">Graph It</button>
    <canvas id="graphCanvas"></canvas>
  </div>

  <div id="smart" class="tab-content" style="display:none;">
    <input type="text" id="smartInput" placeholder="Ask: derivative x^3, integral x^2, 10kg to pounds">
    <button class="btn eq" onclick="smartCalc()">Solve</button>
    <div id="smartResult" class="steps"></div>
  </div>

  <div id="finance" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Loan Calculator HP12C Style</h3>
      <input type="text" id="loanAmount" placeholder="Loan Amount">
      <input type="text" id="loanRate" placeholder="Interest Rate % per year">
      <input type="text" id="loanYears" placeholder="Years">
      <button class="btn eq" onclick="calcLoan()">Calculate Payment</button>
      <div id="loanResult" class="steps"></div>
    </div>
  </div>

  <div id="steps" class="tab-content" style="display:none;">
    <input type="text" id="stepInput" placeholder="Enter equation: 2x + 5 = 15">
    <button class="btn eq" onclick="showSteps()">Show Steps</button>
    <div id="stepResult" class="steps"></div>
  </div>

  <div id="matrix" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Matrix Calculator 3x3</h3>
      <p style="font-size:12px; color:var(--muted); margin-bottom:10px;">Enter values for Matrix A</p>
      <table id="matrixTable"></table>
      <button class="btn eq" onclick="calcMatrix()">Determinant + Inverse</button>
      <div id="matrixResult" class="steps" style="margin-top:10px;"></div>
    </div>
  </div>

  <div id="stats" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Statistics Calculator</h3>
      <input type="text" id="statsInput" placeholder="Enter data: 5, 10, 15, 20, 25">
      <button class="btn eq" onclick="calcStats()">Mean, Median, SD</button>
      <div id="statsResult" class="steps" style="margin-top:10px;"></div>
    </div>
  </div>

  <div id="history" class="tab-content" style="display:none;">
    <div class="panel">
      <h3>Calculation History</h3>
      <button class="btn" onclick="clearHistory()">Clear History</button>
      <div id="historyList" class="history" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
let chart;
let history = JSON.parse(localStorage.getItem('shanaHistory')) || [];
let deferredPrompt;
let lastAns = 0;
let isDeg = true;

// INLINE PWA
const manifest = {
  "name": "SHANA CALC",
  "short_name": "SHANA",
  "start_url": ".",
  "display": "standalone",
  "background_color": "#050508",
  "theme_color": "#00d4ff",
  "orientation": "portrait"
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);

const swCode = `
self.addEventListener('install', e => e.waitUntil(caches.open('shana-v3').then(c => c.addAll(['./']))));
self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
`;
const swBlob = new Blob([swCode], {type: 'application/javascript'});
const swURL = URL.createObjectURL(swBlob);
if('serviceWorker' in navigator) navigator.serviceWorker.register(swURL);

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
});
function installPWA(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('installBanner').style.display = 'none';
    });
  }
}

function toggleDegRad(){
  isDeg =!isDeg;
  document.getElementById('degRad').innerText = isDeg? 'DEG' : 'RAD';
}

function switchTab(e, tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tab).style.display='block';
  e.target.classList.add('active');
  if(tab==='matrix') buildMatrix();
  if(tab==='history') loadHistory();
}

function add(val){
  if(val === 'ans') val = lastAns;
  document.getElementById('display').value += val;
}
function clearDisplay(){document.getElementById('display').value = '';}
function del(){let d=document.getElementById('display'); d.value = d.value.slice(0,-1);}

function calculate(){
  try{
    let expr = document.getElementById('display').value;
    // Unit conversions
    expr = expr.replace(/(\d+)\s*kg\s*to\s*lb/gi, (_,n)=>`${n}*2.20462`);
    expr = expr.replace(/(\d+)%\s*of\s*(\d+)/gi, (_,a,b)=>`${b}*${a}/100`);
    expr = expr.replace(/ans/gi, lastAns);

    // Handle DEG/RAD for trig
    let scope = {deg: isDeg};
    if(isDeg){
      expr = expr.replace(/sin\(/g,'sin(pi/180*').replace(/cos\(/g,'cos(pi/180*').replace(/tan\(/g,'tan(pi/180*');
      expr = expr.replace(/asin\(/g,'asin(').replace(/acos\(/g,'acos(').replace(/atan\(/g,'atan(');
    }

    let result = math.evaluate(expr, scope);
    lastAns = result;
    document.getElementById('display').value = result;
    saveToHistory(expr, result);
    navigator.vibrate?.(50);
  }catch(e){alert('Error: '+e.message)}
}

function drawGraph(){
  let func = document.getElementById('graphInput').value;
  let xValues = [], yValues = [];
  for(let x=-10; x<=10; x+=0.1){
    try{
      let y = math.evaluate(func, {x:x});
      if(isFinite(y) && Math.abs(y) < 1000){ xValues.push(x); yValues.push(y); }
    }catch{}
  }
  if(chart) chart.destroy();
  let ctx = document.getElementById('graphCanvas');
  chart = new Chart(ctx, {
    type: 'line',
    data: {labels: xValues, datasets:[{
      label:func, data:yValues, borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,0.1)',
      tension:0.3, fill:true, pointRadius:0
    }]},
    options:{
      animation:{duration:800},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.1)'}, ticks:{color:'#94a3b8'}},
        y:{grid:{color:'rgba(255,255,255,0.1)'}, ticks:{color:'#94a3b8'}}
      },
      plugins:{legend:{labels:{color:'#f1f5f9'}}}
    }
  });
}

// FIXED SMART AI - uses math.derivative correctly
function smartCalc(){
  let q = document.getElementById('smartInput').value.toLowerCase();
  let res = "Input: "+q+"<br>";
  try{
    if(q.includes('derivative')){
      let expr = q.replace('derivative','').trim();
      let node = math.parse(expr);
      let d = math.derivative(node, 'x');
      res += `d/dx(${expr}) = ${d.toString()}`;
    }
    else if(q.includes('integral')){
      res += `∫ ${q.replace('integral','')} dx = Symbolic integral not fully supported. Try WolframAlpha for full CAS.`;
    }
    else if(q.includes('to')){
      res += `Result: ${math.evaluate(q)}`;
    }
    else{
      res += `Result: ${math.evaluate(q)}`;
    }
  }catch(e){ res += "Error: "+e.message }
  document.getElementById('smartResult').innerHTML = res;
}

function calcLoan(){
  let P = parseFloat(document.getElementById('loanAmount').value);
  let r = parseFloat(document.getElementById('loanRate').value)/100/12;
  let n = parseFloat(document.getElementById('loanYears').value)*12;
  let payment = P * r / (1 - Math.pow(1+r, -n));
  document.getElementById('loanResult').innerHTML =
  `Monthly Payment: R${payment.toFixed(2)}<br>Total Paid: R${(payment*n).toFixed(2)}<br>Total Interest: R${(payment*n - P).toFixed(2)}`;
}

// REAL STEP SOLVER for linear equations
function showSteps(){
  let eq = document.getElementById('stepInput').value;
  let res = `Equation: ${eq}<br>`;
  try{
    let parts = eq.split('=');
    if(parts.length === 2){
      let left = parts[0].trim();
      let right = parts[1].trim();
      res += `Step 1: ${left} = ${right}<br>`;
      res += `Step 2: Move constants to RHS<br>`;
      let solution = math.solve? math.solve(eq, 'x') : "x = " + ((math.evaluate(right) - math.evaluate(left.replace('x','0')))/math.evaluate(left.replace(/[^0-9.]/g,''))) ;
      res += `Step 3: Solve for x<br>Answer: ${solution}`;
    } else {
      res += `Answer: ${math.evaluate(eq)}`;
    }
  }catch(e){ res += "Could not solve. Use simple linear form: ax + b = c" }
  document.getElementById('stepResult').innerHTML = res;
}

function buildMatrix(){
  let html = '';
  for(let i=0; i<3; i++){
    html += '<tr>';
    for(let j=0; j<3; j++){
      html += `<td><input type="number" id="m${i}${j}" value="0" style="width:60px; background:rgba(0,0,0,0.8); color:#fff; border:1px solid rgba(255,255,255,0.1);"></td>`;
    }
    html += '</tr>';
  }
  document.getElementById('matrixTable').innerHTML = html;
}
function calcMatrix(){
  try{
    let m = [];
    for(let i=0; i<3; i++){
      m[i] = [];
      for(let j=0; j<3; j++){
        m[i][j] = parseFloat(document.getElementById(`m${i}${j}`).value) || 0;
      }
    }
    let det = math.det(m);
    let inv = det === 0? "No inverse. Determinant = 0" : JSON.stringify(math.inv(m));
    document.getElementById('matrixResult').innerHTML =
    `Determinant: ${det}<br><br>Inverse:<br>${inv}`;
  }catch(e){
    document.getElementById('matrixResult').innerHTML = "Error: "+e.message;
  }
}

function calcStats(){
  let data = document.getElementById('statsInput').value.split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
  if(data.length===0) return alert("Enter numbers separated by commas");
  let mean = math.mean(data);
  let median = math.median(data);
  let sd = math.std(data);
  document.getElementById('statsResult').innerHTML =
  `Count: ${data.length}<br>Mean: ${mean.toFixed(2)}<br>Median: ${median}<br>Std Dev: ${sd.toFixed(2)}`;
}

function saveToHistory(expr, result){
  let entry = {expr: expr || document.getElementById('display').value, result: result, time: new Date().toLocaleTimeString()};
  history.unshift(entry);
  if(history.length > 20) history.pop();
  localStorage.setItem('shanaHistory', JSON.stringify(history));
}
function loadHistory(){
  let html = history.map(h=>`<div>${h.time}: ${h.expr} = ${h.result}</div>`).join('');
  document.getElementById('historyList').innerHTML = html || 'No history yet';
}
function clearHistory(){
  history = []; localStorage.removeItem('shanaHistory'); loadHistory();
}
function shareWhatsApp(){
  let text = `SHANA CALC Result: ${document.getElementById('display').value}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

document.getElementById('display').addEventListener('keypress', e=>{if(e.key==='Enter') calculate();})
</script>
</body>
</html>
