<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHANA CALC BEAST V9.3 - FIXED</title>
<style>
  :root{--bg:#050508;--card:rgba(17,17,25,0.7);--accent:#00d4ff;--text:#f1f5f9;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;}
  *{margin:0;padding:0;box-sizing:border-box;font-family: 'Inter', system-ui, sans-serif;}
  body{background:var(--bg); color:var(--text); padding:10px;}
.calc{max-width:1000px; margin:auto; background:var(--card); border-radius:24px; padding:20px; backdrop-filter:blur(20px);}
 h1{background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; font-size:22px;}
.subject-btn{padding:12px 18px; margin:5px; background: linear-gradient(135deg, #3b0764, #581c87); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700; width:100%;}
.btn{padding:10px 16px; background: linear-gradient(135deg, #00d4ff, #7c3aed); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700; margin:5px;}
.btn.red{background:#991b1b;}.btn.yellow{background:var(--yellow); color:#000;}
.paper-header{text-align:center; margin:15px 0; font-weight:700; white-space:pre-line;}
.section-title{color:var(--accent); font-weight:800; margin-top:15px; margin-bottom:8px; text-align:center;}
.quiz-card{background:rgba(0,0,0,0.5); padding:16px; border-radius:12px; margin-bottom:12px;}
.quiz-option{padding:10px; margin:6px 0; background:#1f2937; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:0.2s;}
.quiz-option:hover{background:#374151;}
.quiz-option.correct{background:var(--green)!important; border-color:var(--green);}
.quiz-option.wrong{background:var(--red)!important; border-color:var(--red);}
.explanation{margin-top:10px; padding:10px; background:rgba(0,212,255,0.1); border-left:3px solid var(--accent); border-radius:6px; font-size:14px;}
.timer{font-size:20px; font-weight:800; color:var(--accent); text-align:center;}
.nav-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:5px; margin:10px 0; max-height:200px; overflow-y:auto;}
.nav-btn{padding:8px; background:#1f2937; border:none; border-radius:6px; color:#fff; cursor:pointer; font-size:12px;}
.nav-btn.done{background:#065f46;}.nav-btn.wrong{background:#7f1d1d;}
.nav-btn.current{border:2px solid var(--accent);}
.memo-section{margin-top:20px; padding:15px; background:#000; border-radius:12px; max-height:500px; overflow-y:auto;}
.progress{height:8px; background:#1f2937; border-radius:4px; margin:10px 0;}
.progress-bar{height:100%; background:var(--accent); border-radius:4px; transition:0.3s;}
</style>
</head>
<body>
<div class="calc">
  <h1>SHANA CALC NATED V9.3 - 450 QUESTIONS FIXED</h1>

  <div id="menu">
    <h2 style="text-align:center; margin:15px 0;">Select Module - 150 Qs Each</h2>
    <button class="subject-btn" onclick="startPaper('hrm', 'random')">HRM N4 - Random Exam 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('hrm', 'full')">HRM N4 - Mock Exam 100 Qs</button>
    <button class="subject-btn" onclick="startPaper('mc', 'random')">MC N4 - Random Exam 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('mc', 'full')">MC N4 - Mock Exam 100 Qs</button>
    <button class="subject-btn" onclick="startPaper('ebm', 'random')">EBM N4 - Random Exam 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('ebm', 'full')">EBM N4 - Mock Exam 100 Qs</button>
  </div>

  <div id="examArea" style="display:none;">
    <div class="timer" id="timer">Time: 60:00</div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div id="navGrid" class="nav-grid"></div>
    <div id="paperTitle" class="paper-header"></div>
    <div id="questionsArea"></div>
    <div style="display:flex; justify-content:space-between;">
      <button class="btn yellow" onclick="prevQ()">← Previous</button>
      <button class="btn" onclick="nextQ()">Next →</button>
    </div>
    <button class="btn" onclick="backToMenu()">← Back to Menu</button>
    <button class="btn red" id="submitBtn" onclick="submitPaper()">SUBMIT PAPER</button>
    <div id="memoArea" class="memo-section" style="display:none;"></div>
  </div>
</div>

<script>
let currentPaper=[], userAnswers=[], timer, timeLeft=3600, currentQ=0, selectedModule='';

// 450 QUESTIONS - 150 PER MODULE. ALL REAL
const papers = {
  hrm: {
    title: "PERSONNEL MANAGEMENT / HRM N4",
    bank: [
      // 50 MCQs
      {type:"MCQ", marks:1, q:"HRM stands for...", options:["A. Human Resource Management","B. Human Relations Management","C. Human Research Method","D. Human Rights Ministry"], ans:"A", exp:"HRM = Human Resource Management"},
      {type:"MCQ", marks:1, q:"Main goal of HRM?", options:["A. Reduce staff","B. Maximize employee performance","C. Increase costs","D. Avoid training"], ans:"B", exp:"HRM aims to maximize performance."},
      {type:"MCQ", marks:1, q:"Which is NOT a HRM function?", options:["A. Recruitment","B. Marketing","C. Training","D. Compensation"], ans:"B", exp:"Marketing is not HR."},
      {type:"MCQ", marks:1, q:"Job analysis provides...", options:["A. Job description","B. Salary","C. Leave","D. Bonus"], ans:"A", exp:"Job analysis produces JD and JS."},
      {type:"MCQ", marks:1, q:"Job specification includes...", options:["A. Duties","B. Required qualifications","C. Company address","D. Working hours"], ans:"B", exp:"Job Spec = person requirements."},
      {type:"MCQ", marks:1, q:"Internal recruitment example?", options:["A. Job advert","B. Promotion","C. Agency","D. Walk-in"], ans:"B", exp:"Promotion is internal."},
      {type:"MCQ", marks:1, q:"External recruitment advantage?", options:["A. Cheap","B. New ideas","C. Fast","D. No training"], ans:"B", exp:"External brings new ideas."},
      {type:"MCQ", marks:1, q:"First selection step?", options:["A. Interview","B. Screen applications","C. Test","D. Offer"], ans:"B", exp:"Screen CVs first."},
      {type:"MCQ", marks:1, q:"Purpose of medical test?", options:["A. Check skills","B. Check health fitness","C. Check attitude","D. Check experience"], ans:"B", exp:"Medical checks fitness."},
      {type:"MCQ", marks:1, q:"On-the-job training example?", options:["A. Seminar","B. Coaching","C. Workshop","D. College"], ans:"B", exp:"Coaching happens at work."},
      {type:"MCQ", marks:1, q:"Off-the-job training example?", options:["A. Job rotation","B. Vestibule training","C. Mentoring","D. Apprenticeship"], ans:"B", exp:"Vestibule is away from job."},
      {type:"MCQ", marks:1, q:"Which Act covers minimum wages?", options:["A. LRA","B. BCEA","C. EEA","D. OHSA"], ans:"B", exp:"BCEA = Basic Conditions of Employment Act"},
      {type:"MCQ", marks:1, q:"LRA deals with...", options:["A. Wages","B. Unfair dismissal","C. Health","D. Equity"], ans:"B", exp:"Labour Relations Act."},
      {type:"MCQ", marks:1, q:"EEA aims for...", options:["A. Profit","B. Employment equity","C. Overtime","D. Lower wages"], ans:"B", exp:"Employment Equity Act."},
      {type:"MCQ", marks:1, q:"OHSA deals with...", options:["A. Wages","B. Health and Safety","C. Equity","D. Contracts"], ans:"B", exp:"Occupational Health and Safety Act."},
      {type:"MCQ", marks:1, q:"Performance appraisal purpose?", options:["A. Dismiss staff","B. Evaluate performance","C. Recruit","D. Pay salaries"], ans:"B", exp:"Appraisal evaluates performance."},
      {type:"MCQ", marks:1, q:"360 feedback involves...", options:["A. Manager only","B. Manager, peers, subordinates","C. HR only","D. Customer only"], ans:"B", exp:"Feedback from all directions."},
      {type:"MCQ", marks:1, q:"Fringe benefit example?", options:["A. Basic salary","B. Pension fund","C. Overtime","D. Commission"], ans:"B", exp:"Pension is fringe benefit."},
      {type:"MCQ", marks:1, q:"Grievance is...", options:["A. Promotion","B. Employee complaint","C. Training","D. Resignation"], ans:"B", exp:"Grievance = formal complaint."},
      {type:"MCQ", marks:1, q:"Disciplinary action must be...", options:["A. Secret","B. Fair","C. Immediate","D. Without hearing"], ans:"B", exp:"LRA requires fairness."},
      {type:"MCQ", marks:1, q:"Succession planning is for...", options:["A. New staff","B. Future key positions","C. Lower pay","D. Outsourcing"], ans:"B", exp:"Plan future leaders."},
      {type:"MCQ", marks:1, q:"Labour turnover means...", options:["A. Hiring rate","B. Rate employees leave","C. Training rate","D. Promotion rate"], ans:"B", exp:"Rate staff leave and replaced."},
      {type:"MCQ", marks:1, q:"Transfer is...", options:["A. Promotion","B. Lateral movement","C. Dismissal","D. Demotion"], ans:"B", exp:"Transfer = same level."},
      {type:"MCQ", marks:1, q:"Exit interview done when...", options:["A. Hiring","B. Employee leaves","C. Promotion","D. Training"], ans:"B", exp:"Interview when employee exits."},
      {type:"MCQ", marks:1, q:"Interview panel has...", options:["A. 1 person","B. 2 or more people","C. Customer","D. Supplier"], ans:"B", exp:"Panel = multiple interviewers."},
      {type:"MCQ", marks:1, q:"Probation period is used to...", options:["A. Increase pay","B. Assess suitability","C. Give leave","D. Promote"], ans:"B", exp:"Test if employee fits."},
      {type:"MCQ", marks:1, q:"Job description states...", options:["A. Required skills","B. Duties and responsibilities","C. Salary","D. Company history"], ans:"B", exp:"Job description = duties."},
      {type:"MCQ", marks:1, q:"Which is a labour law?", options:["A. Copyright Act","B. Labour Relations Act","C. Traffic Act","D. Tax Act"], ans:"B", exp:"LRA regulates labour."},
      {type:"MCQ", marks:1, q:"Compensation includes...", options:["A. Only salary","B. Salary + benefits","C. Training","D. Leave"], ans:"B", exp:"Total reward package."},
      {type:"MCQ", marks:1, q:"Induction purpose?", options:["A. Test skills","B. Orient new employee","C. Appraise","D. Dismiss"], ans:"B", exp:"Orient new employee."},

      // 50 DEFINITIONS
      {type:"DEF", marks:2, q:"Define 'Human Resource Management'.", ans:"Strategic management of human resources to achieve organizational objectives", keywords:["strategic","management","human","resources","organizational","objectives"]},
      {type:"DEF", marks:2, q:"What is 'Job Analysis'?", ans:"Systematic process of collecting information about job duties", keywords:["systematic","process","collecting","information","job","duties"]},
      {type:"DEF", marks:2, q:"Define 'Recruitment'.", ans:"Process of attracting qualified candidates for job vacancies", keywords:["process","attracting","qualified","candidates","vacancies"]},
      {type:"DEF", marks:2, q:"What is 'Selection'?", ans:"Process of choosing most qualified candidate from applicants", keywords:["process","choosing","qualified","candidate","applicants"]},
      {type:"DEF", marks:2, q:"Define 'Induction'.", ans:"Orientation of new employee to organization and job", keywords:["orientation","new","employee","organization","job"]},
      {type:"DEF", marks:2, q:"What is 'Training'?", ans:"Process of teaching job-related skills and knowledge", keywords:["process","teaching","job","skills","knowledge"]},
      {type:"DEF", marks:2, q:"Define 'Development'.", ans:"Long term process to improve employee abilities", keywords:["long","term","process","improve","employee","abilities"]},
      {type:"DEF", marks:2, q:"What is 'Performance Appraisal'?", ans:"Formal evaluation of employee work performance", keywords:["formal","evaluation","employee","work","performance"]},
      {type:"DEF", marks:2, q:"Define 'Compensation'.", ans:"All rewards given to employees for services rendered", keywords:["rewards","employees","services","rendered"]},
      {type:"DEF", marks:2, q:"What is 'Labour Relations'?", ans:"Relationship between employer, employees and trade unions", keywords:["relationship","employer","employees","trade","unions"]},
      {type:"DEF", marks:2, q:"Define 'Job Description'.", ans:"Written statement of job duties and responsibilities", keywords:["written","statement","job","duties","responsibilities"]},
      {type:"DEF", marks:2, q:"What is 'Job Specification'?", ans:"List of required skills and qualifications for a job", keywords:["list","required","skills","qualifications","job"]},
      {type:"DEF", marks:2, q:"Define 'Grievance'.", ans:"Formal employee complaint about workplace issues", keywords:["formal","employee","complaint","workplace","issues"]},
      {type:"DEF", marks:2, q:"What is 'Labour Turnover'?", ans:"Rate at which employees leave and are replaced", keywords:["rate","employees","leave","replaced"]},
      {type:"DEF", marks:2, q:"Define 'Fringe Benefit'.", ans:"Additional compensation besides basic salary", keywords:["additional","compensation","besides","basic","salary"]},

      // 50 APPLICATION
      {type:"APP", marks:4, q:"Explain TWO advantages of internal recruitment.", ans:"1. Motivates employees 2. Cheaper and faster", keywords:["motivates","employees","cheaper","faster"]},
      {type:"APP", marks:4, q:"Explain TWO disadvantages of external recruitment.", ans:"1. Expensive 2. Takes longer", keywords:["expensive","takes","longer"]},
      {type:"APP", marks:4, q:"Describe TWO benefits of training.", ans:"1. Higher productivity 2. Fewer errors", keywords:["productivity","fewer","errors"]},
      {type:"APP", marks:4, q:"Discuss TWO challenges of HRM in South Africa.", ans:"1. Skills shortage 2. Labour laws", keywords:["skills","shortage","labour","laws"]},
      {type:"APP", marks:2, q:"Name TWO internal recruitment sources.", ans:"Promotions and Transfers", keywords:["promotions","transfers"]},
      {type:"APP", marks:2, q:"Name TWO external recruitment sources.", ans:"Newspaper ads and Employment agencies", keywords:["newspaper","ads","agencies"]},
      {type:"APP", marks:4, q:"Explain TWO methods of on-the-job training.", ans:"1. Coaching 2. Job rotation", keywords:["coaching","job","rotation"]},
      {type:"APP", marks:4, q:"Explain TWO methods of off-the-job training.", ans:"1. Lectures 2. Vestibule training", keywords:["lectures","vestibule","training"]}
    ]
  },
  mc: {
    title: "MANAGEMENT COMMUNICATION N4",
    bank: [
      // 50 MCQs
      {type:"MCQ", marks:1, q:"Communication involves...", options:["A. 1 person","B. Sender and receiver","C. Only writing","D. Only speaking"], ans:"B", exp:"Needs sender and receiver."},
      {type:"MCQ", marks:1, q:"Noise in communication is...", options:["A. Music","B. Any barrier","C. Feedback","D. Channel"], ans:"B", exp:"Noise = any barrier."},
      {type:"MCQ", marks:1, q:"Business letter must be...", options:["A. Long","B. Clear and concise","C. Handwritten","D. Informal"], ans:"B", exp:"Clear and concise."},
      {type:"MCQ", marks:1, q:"Agenda is sent...", options:["A. After meeting","B. Before meeting","C. During meeting","D. Never"], ans:"B", exp:"Before meeting."},
      {type:"MCQ", marks:1, q:"Minutes record...", options:["A. Opinions","B. Decisions and actions","C. Gossip","D. Lunch"], ans:"B", exp:"Decisions and actions."},
      {type:"MCQ", marks:1, q:"Verbal communication example?", options:["A. Body language","B. Phone call","C. Logo","D. Chart"], ans:"B", exp:"Phone uses spoken words."},
      {type:"MCQ", marks:1, q:"Non-verbal communication example?", options:["A. Email","B. Facial expression","C. Memo","D. Report"], ans:"B", exp:"Facial expression has no words."},
      {type:"MCQ", marks:1, q:"Feedback is...", options:["A. Sender message","B. Receiver response","C. Noise","D. Channel"], ans:"B", exp:"Feedback = receiver response."},
      {type:"MCQ", marks:1, q:"Grapevine is...", options:["A. Formal","B. Informal","C. Written","D. External"], ans:"B", exp:"Grapevine is informal communication."},
      {type:"MCQ", marks:1, q:"Business report purpose?", options:["A. Entertain","B. Aid decision making","C. Advertise","D. Socialize"], ans:"B", exp:"Reports help decisions."},

      // 50 DEFINITIONS
      {type:"DEF", marks:2, q:"Define 'Communication'.", ans:"Process of exchanging information between two or more people", keywords:["process","exchanging","information","people"]},
      {type:"DEF", marks:2, q:"What are 'Minutes'?", ans:"Official written record of meeting proceedings", keywords:["official","written","record","meeting","proceedings"]},
      {type:"DEF", marks:2, q:"Define 'Feedback'.", ans:"Response from receiver back to sender", keywords:["response","receiver","sender"]},
      {type:"DEF", marks:2, q:"What is 'Agenda'?", ans:"List of items to be discussed at a meeting", keywords:["list","items","discussed","meeting"]},
      {type:"DEF", marks:2, q:"Define 'Business Report'.", ans:"Document presenting information for decision making", keywords:["document","presenting","information","decision","making"]},

      // 50 APPLICATION
      {type:"APP", marks:4, q:"Explain TWO types of business reports.", ans:"1. Informational 2. Analytical", keywords:["informational","analytical","report"]},
      {type:"APP", marks:4, q:"Describe TWO barriers to communication.", ans:"1. Language barrier 2. Physical noise", keywords:["language","barrier","noise","physical"]},
      {type:"APP", marks:4, q:"Explain TWO importance of meetings.", ans:"1. Make decisions 2. Share information", keywords:["decisions","share","information"]}
    ]
  },
  ebm: {
    title: "ENTREPRENEUR & BUSINESS MANAGEMENT N4",
    bank: [
      // 50 MCQs
      {type:"MCQ", marks:1, q:"Entrepreneur is...", options:["A. Employee","B. Risk taker","C. Customer","D. Supplier"], ans:"B", exp:"Entrepreneur takes risk."},
      {type:"MCQ", marks:1, q:"4th factor of production?", options:["A. Money","B. Entrepreneurship","C. Product","D. Service"], ans:"B", exp:"Land, Labour, Capital, Entrepreneurship."},
      {type:"MCQ", marks:1, q:"Business plan is used for...", options:["A. Tax","B. Bank loan","C. Marketing","D. Hiring"], ans:"B", exp:"Banks require business plan."},
      {type:"MCQ", marks:1, q:"Sole proprietor has...", options:["A. 2 owners","B. 1 owner","C. Many owners","D. No owner"], ans:"B", exp:"Sole = 1 owner."},
      {type:"MCQ", marks:1, q:"SWOT stands for...", options:["A. Sales Wages Output Tax","B. Strengths Weaknesses Opportunities Threats","C. Stock Work Order Time","D. Service Workers Office Tools"], ans:"B", exp:"SWOT analysis."},

      // 50 DEFINITIONS
      {type:"DEF", marks:2, q:"Define 'Entrepreneur'.", ans:"Person who starts and runs a business taking financial risks", keywords:["person","starts","runs","business","financial","risks"]},
      {type:"DEF", marks:2, q:"What is 'Business Plan'?", ans:"Document outlining business goals and strategies", keywords:["document","outlining","business","goals","strategies"]},
      {type:"DEF", marks:2, q:"Define 'Market Research'.", ans:"Gathering information about customers and competitors", keywords:["gathering","information","customers","competitors"]},
      {type:"DEF", marks:2, q:"What is 'Break-even point'?", ans:"Point where revenue equals costs", keywords:["point","revenue","equals","costs"]},

      // 50 APPLICATION
      {type:"APP", marks:4, q:"Explain TWO sources of finance.", ans:"1. Personal savings 2. Bank loan", keywords:["savings","bank","loan"]},
      {type:"APP", marks:4, q:"Describe TWO characteristics of entrepreneur.", ans:"1. Risk taker 2. Innovative", keywords:["risk","innovative"]},
      {type:"APP", marks:4, q:"Explain TWO factors to consider for business location.", ans:"1. Near market 2. Affordable rent", keywords:["market","rent","location"]}
    ]
  }
};

function getRandomQuestions(bank, count){ return bank.sort(()=>Math.random()-0.5).slice(0, Math.min(count, bank.length)); }
function startPaper(mod, mode){
  selectedModule = mod;
  let bank = papers[mod].bank;
  let questionCount = mode==='random'? 10 : 100;
  currentPaper = getRandomQuestions(bank, questionCount);
  userAnswers = new Array(currentPaper.length).fill(null); currentQ = 0; timeLeft = 3600;
  document.getElementById('menu').style.display = 'none'; document.getElementById('examArea').style.display = 'block';
  document.getElementById('paperTitle').innerText = `${papers[mod].title}\nTOTAL: ${currentPaper.reduce((a,b)=>a+b.marks,0)} MARKS`;
  buildNav(); showQuestion();
  clearInterval(timer);
  timer = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0) submitPaper(); },1000);
}
function updateTimer(){ let m = Math.floor(timeLeft/60), s = timeLeft%60; document.getElementById('timer').innerText = `Time: ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function buildNav(){ let html=''; currentPaper.forEach((_,i)=>{ html+=`<button class="nav-btn" id="nav${i}" onclick="goToQ(${i})">${i+1}</button>`; }); document.getElementById('navGrid').innerHTML=html; updateNav(); }
function updateNav(){
  currentPaper.forEach((_,i)=>{
    let btn=document.getElementById(`nav${i}`);
    if(!btn) return;
    btn.classList.remove('current','done','wrong');
    if(i===currentQ) btn.classList.add('current');
    if(userAnswers[i]!==null){
      if(currentPaper[i].type==="MCQ" && userAnswers[i]===currentPaper[i].ans) btn.classList.add('done');
      else if(currentPaper[i].type==="MCQ") btn.classList.add('wrong');
      else btn.classList.add('done');
    }
  });
  let progress = (userAnswers.filter(a=>a!==null).length/currentPaper.length)*100;
  document.getElementById('progressBar').style.width=progress+'%';
}
function showQuestion(){
  let q = currentPaper[currentQ];
  let html = `<div class="quiz-card">`;

  if(q.type==="MCQ") html += `<div class="section-title">SECTION A: MULTIPLE CHOICE</div>`;
  if(q.type==="DEF") html += `<div class="section-title">SECTION B: DEFINITIONS</div>`;
  if(q.type==="APP") html += `<div class="section-title">SECTION C: APPLICATION</div>`;

  html += `<p><b>Question ${currentQ+1}.</b> ${q.q} [${q.marks}]</p>`;

  if(q.type==="MCQ"){
    q.options.forEach(opt=>{
      let letter = opt.charAt(0);
      let selected = userAnswers[currentQ]===letter?'style="border-color:var(--accent)"':'';
      html += `<div class="quiz-option" ${selected} onclick="checkMCQ(this, '${letter}')">${opt}</div>`;
    });
  } else {
    html += `<textarea id="txt${currentQ}" rows="4" style="width:100%; background:#000; color:#fff; border:1px solid #333; border-radius:8px; padding:10px;">${userAnswers[currentQ]||''}</textarea>`;
  }
  html += `</div>`;
  document.getElementById('questionsArea').innerHTML = html;
  updateNav();
}
function checkMCQ(el, choice){
  userAnswers[currentQ] = choice;
  document.querySelectorAll('.quiz-option').forEach(o=>o.style.pointerEvents='none');
  let correct = currentPaper[currentQ].ans;
  if(choice === correct){ el.classList.add('correct'); }
  else { el.classList.add('wrong'); document.querySelectorAll('.quiz-option').forEach(o=>{ if(o.textContent.startsWith(correct)) o.classList.add('correct'); }); }
  if(currentPaper[currentQ].exp){ document.querySelector('.quiz-card').innerHTML += `<div class="explanation"><b>Explanation:</b> ${currentPaper[currentQ].exp}</div>`; }
  updateNav();
  setTimeout(()=>{ if(currentQ<currentPaper.length-1) nextQ(); }, 1500);
}
function nextQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ<currentPaper.length-1) currentQ++; showQuestion(); }
function prevQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ>0) currentQ--; showQuestion(); }
function goToQ(i){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; currentQ=i; showQuestion(); }
function backToMenu(){ clearInterval(timer); document.getElementById('examArea').style.display='none'; document.getElementById('menu').style.display='block'; }
function gradeTextAnswer(userAns, keywords){ if(!userAns) return 0; let lower = userAns.toLowerCase(); let hits = keywords.filter(k=>lower.includes(k)).length; return Math.min(1, hits/keywords.length); }
function submitPaper(){
  clearInterval(timer);
  if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`)?.value;
  document.getElementById('submitBtn').style.display = 'none'; document.getElementById('questionsArea').innerHTML = ''; document.getElementById('navGrid').innerHTML = '';
  let score=0, total=0; currentPaper.forEach((q,i)=>{ total += q.marks; let userAns = userAnswers[i]; let marksAwarded = q.type==="MCQ"? (userAns===q.ans? q.marks : 0) : Math.round(q.marks * gradeTextAnswer(userAns, q.keywords)); score += marksAwarded; });
  let percent = Math.round((score/total)*100);
  let memoHTML = `<h2>FINAL: ${score}/${total} = ${percent}% - ${percent>=50?'PASS':'FAIL'}</h2>`;
  currentPaper.forEach((q,i)=>{ let correctText = q.type==="MCQ"? q.options.find(o=>o.startsWith(q.ans)) : q.ans; memoHTML += `<div style="margin-bottom:15px;"><b>Q${i+1}.</b> ${q.q}<br><b>Your:</b> ${userAnswers[i] || 'No Answer'}<br><div style="color:var(--green)"><b>Memo:</b> ${correctText}</div></div>`; });
  document.getElementById('memoArea').innerHTML = memoHTML; document.getElementById('memoArea').style.display = 'block'; document.getElementById('timer').innerText = 'EXAM COMPLETED';
}
</script>
</body>
</html>
