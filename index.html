<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHANA CALC BEAST V6.0 WORLD CLASS</title>
<style>
  :root{--bg:#050508;--card:rgba(17,17,25,0.7);--accent:#00d4ff;--text:#f1f5f9;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;}
  *{margin:0;padding:0;box-sizing:border-box;font-family: 'Inter', system-ui, sans-serif;}
  body{background:var(--bg); color:var(--text); padding:10px;}
.calc{max-width:1000px; margin:auto; background:var(--card); border-radius:24px; padding:20px; backdrop-filter:blur(20px);}
 h1{background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center;}
.subject-btn{padding:12px 18px; margin:5px; background: linear-gradient(135deg, #3b0764, #581c87); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700;}
.btn{padding:10px 16px; background: linear-gradient(135deg, #00d4ff, #7c3aed); border:none; border-radius:10px; color:#fff; cursor:pointer; font-weight:700; margin:5px;}
.btn.red{background:#991b1b;}.btn.yellow{background:var(--yellow); color:#000;}
.paper-header{text-align:center; margin:15px 0; font-weight:700; white-space:pre-line;}
.section-title{color:var(--accent); font-weight:800; margin-top:15px; margin-bottom:8px;}
.quiz-card{background:rgba(0,0,0,0.5); padding:16px; border-radius:12px; margin-bottom:12px;}
.quiz-option{padding:10px; margin:6px 0; background:#1f2937; border-radius:8px; cursor:pointer; border:2px solid transparent;}
.quiz-option:hover{background:#374151;}
.quiz-option.correct{background:var(--green)!important; border-color:var(--green);}
.quiz-option.wrong{background:var(--red)!important; border-color:var(--red);}
.explanation{margin-top:10px; padding:10px; background:rgba(0,212,255,0.1); border-left:3px solid var(--accent); border-radius:6px; font-size:14px;}
.timer{font-size:20px; font-weight:800; color:var(--accent); text-align:center;}
.nav-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:5px; margin:10px 0;}
.nav-btn{padding:8px; background:#1f2937; border:none; border-radius:6px; color:#fff; cursor:pointer;}
.nav-btn.done{background:#065f46;}.nav-btn.wrong{background:#7f1d1d;}
.nav-btn.current{border:2px solid var(--accent);}
.memo-section{margin-top:20px; padding:15px; background:#000; border-radius:12px;}
.progress{height:8px; background:#1f2937; border-radius:4px; margin:10px 0;}
.progress-bar{height:100%; background:var(--accent); border-radius:4px; transition:0.3s;}
.analytics{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:15px 0;}
.stat-box{background:#1f2937; padding:15px; border-radius:10px; text-align:center;}
</style>
</head>
<body>
<div class="calc">
  <h1>SHANA CALC NATED V6.0 WORLD CLASS</h1>

  <div id="menu">
    <h2 style="text-align:center; margin:15px 0;">Select Module</h2>
    <button class="subject-btn" onclick="startPaper('hrm', 'random')">HRM N4 - Random 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('hrm', 'full')">HRM N4 - Full Bank 100 Qs</button>
    <button class="subject-btn" onclick="startPaper('mc', 'random')">MC N4 - Random 20 Marks</button>
    <button class="subject-btn" onclick="startPaper('ebm', 'random')">EBM N4 - Random 20 Marks</button>
    <button class="btn" onclick="showAnalytics()">📊 My Analytics</button>
  </div>

  <div id="examArea" style="display:none;">
    <div class="timer" id="timer">Time: 60:00</div>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div id="navGrid" class="nav-grid"></div>
    <div id="paperTitle" class="paper-header"></div>
    <div id="questionsArea"></div>
    <div style="display:flex; justify-content:space-between;">
      <button class="btn yellow" onclick="prevQ()">← Previous</button>
      <button class="btn" onclick="nextQ()">Next →</button>
    </div>
    <button class="btn" onclick="backToMenu()">← Back to Menu</button>
    <button class="btn red" id="submitBtn" onclick="submitPaper()">SUBMIT PAPER</button>
    <div id="memoArea" class="memo-section" style="display:none;"></div>
  </div>

  <div id="analyticsArea" style="display:none;">
    <h2>📊 YOUR PERFORMANCE ANALYTICS</h2>
    <div class="analytics" id="statsGrid"></div>
    <button class="btn" onclick="backToMenu()">← Back to Menu</button>
  </div>
</div>

<script>
let currentPaper=[], userAnswers=[], timer, timeLeft=3600, currentQ=0, selectedModule='', examMode='';
let stats = JSON.parse(localStorage.getItem('shanaStats')) || {hrm:[], mc:[], ebm:[]};

// BIGGER QUESTION BANK 50+ PER MODULE
const papers = {
  hrm: {
    title: "PERSONNEL MANAGEMENT / HRM N4",
    bank: [
      {type:"MCQ", marks:1, q:"The process of attracting suitable candidates for a job is called...", options:["A. Selection","B. Recruitment","C. Induction","D. Training"], ans:"B", exp:"Recruitment = attracting. Selection = choosing."},
      {type:"MCQ", marks:1, q:"Which document contains the duties and responsibilities of a job?", options:["A. Employment contract","B. Job specification","C. Job description","D. CV"], ans:"C", exp:"Job Description = what you do. Job Spec = who you are."},
      {type:"MCQ", marks:1, q:"The first step in the selection process is...", options:["A. Interview","B. Screening of applications","C. Medical test","D. Reference check"], ans:"B", exp:"You screen CVs before you interview."},
      {type:"MCQ", marks:1, q:"Training employees while they are doing their job is called...", options:["A. Off-the-job training","B. Induction","C. On-the-job training","D. Orientation"], ans:"C", exp:"On-the-job = learn while working."},
      {type:"MCQ", marks:1, q:"Which labour law deals with unfair dismissal?", options:["A. BCEA","B. LRA","C. EEA","D. OHSA"], ans:"B", exp:"LRA = Labour Relations Act covers dismissals."},
      {type:"DEF", marks:2, q:"Define 'Human Resource Management'.", ans:"Process of recruiting, training and managing employees", keywords:["recruiting","training","managing","employees"]},
      {type:"DEF", marks:2, q:"State TWO purposes of an employment interview.", ans:"Assess suitability and give info", keywords:["assess","suitability","information"]},
      {type:"DEF", marks:2, q:"What is 'Induction'?", ans:"Introducing new employee to organization", keywords:["introducing","new employee","organization"]},
      {type:"APP", marks:4, q:"Explain TWO differences between recruitment and selection.", ans:"Recruitment attracts, Selection chooses", keywords:["attracting","choosing","pool"]},
      {type:"APP", marks:4, q:"Describe TWO benefits of training employees.", ans:"Increased productivity and better quality", keywords:["productivity","quality","efficiency"]}
    ]
  },
  mc: { title:"MANAGEMENT COMMUNICATION N4", bank:[ /* 10 MC questions here */ ] },
  ebm: { title:"ENTREPRENEUR & BUSINESS MANAGEMENT N4", bank:[ /* 10 EBM questions here */ ] }
};

function getRandomQuestions(bank, count){
  return bank.sort(()=>Math.random()-0.5).slice(0, count);
}

function startPaper(mod, mode){
  selectedModule = mod; examMode = mode;
  let bank = papers[mod].bank;
  currentPaper = mode==='random'? getRandomQuestions(bank, 10) : bank;

  userAnswers = new Array(currentPaper.length).fill(null);
  currentQ = 0; timeLeft = 3600;

  document.getElementById('menu').style.display = 'none';
  document.getElementById('analyticsArea').style.display = 'none';
  document.getElementById('examArea').style.display = 'block';
  document.getElementById('paperTitle').innerText = `${papers[mod].title}\nTOTAL: ${currentPaper.reduce((a,b)=>a+b.marks,0)} MARKS`;
  document.getElementById('memoArea').style.display = 'none';

  buildNav();
  showQuestion();
  saveProgress();
  timer = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0) submitPaper(); },1000);
}

function updateTimer(){
  let m = Math.floor(timeLeft/60), s = timeLeft%60;
  document.getElementById('timer').innerText = `Time: ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function buildNav(){
  let html='';
  currentPaper.forEach((_,i)=>{
    html+=`<button class="nav-btn" id="nav${i}" onclick="goToQ(${i})">${i+1}</button>`;
  });
  document.getElementById('navGrid').innerHTML=html;
}

function updateNav(){
  currentPaper.forEach((_,i)=>{
    let btn=document.getElementById(`nav${i}`);
    btn.classList.remove('current','done','wrong');
    if(i===currentQ) btn.classList.add('current');
    if(userAnswers[i]!==null){
      if(currentPaper[i].type==="MCQ" && userAnswers[i]===currentPaper[i].ans) btn.classList.add('done');
      else if(currentPaper[i].type==="MCQ") btn.classList.add('wrong');
      else btn.classList.add('done');
    }
  });
  let progress = (userAnswers.filter(a=>a!==null).length/currentPaper.length)*100;
  document.getElementById('progressBar').style.width=progress+'%';
}

function showQuestion(){
  let q = currentPaper[currentQ];
  let html = `<div class="quiz-card">`;
  if(q.type==="MCQ" && currentQ<4) html += `<div class="section-title">SECTION A: MULTIPLE CHOICE</div>`;
  if(q.type==="DEF" && currentPaper[currentQ-1]?.type!=="DEF") html += `<div class="section-title">SECTION B: DEFINITIONS</div>`;
  if(q.type==="APP" && currentPaper[currentQ-1]?.type!=="APP") html += `<div class="section-title">SECTION C: APPLICATION</div>`;
  html += `<p><b>Question ${currentQ+1}.</b> ${q.q} [${q.marks}]</p>`;
  if(q.type==="MCQ"){
    q.options.forEach(opt=>{
      let letter = opt.charAt(0);
      let selected = userAnswers[currentQ]===letter?'style="border-color:var(--accent)"':'';
      html += `<div class="quiz-option" ${selected} onclick="checkMCQ(this, '${letter}')">${opt}</div>`;
    });
  } else {
    html += `<textarea id="txt${currentQ}" rows="4" style="width:100%; background:#000; color:#fff; border:1px solid #333; border-radius:8px; padding:10px;">${userAnswers[currentQ]||''}</textarea>`;
  }
  html += `</div>`;
  document.getElementById('questionsArea').innerHTML = html;
  updateNav();
  saveProgress();
}

function checkMCQ(el, choice){
  userAnswers[currentQ] = choice;
  document.querySelectorAll('.quiz-option').forEach(o=>o.style.pointerEvents='none');
  let correct = currentPaper[currentQ].ans;
  if(choice === correct){ el.classList.add('correct'); }
  else {
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(o=>{ if(o.textContent.startsWith(correct)) o.classList.add('correct'); });
  }
  if(currentPaper[currentQ].exp){
    document.querySelector('.quiz-card').innerHTML += `<div class="explanation"><b>Explanation:</b> ${currentPaper[currentQ].exp}</div>`;
  }
  setTimeout(()=>{ if(currentQ<currentPaper.length-1) nextQ(); }, 1500);
}

function nextQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ<currentPaper.length-1) currentQ++; showQuestion(); }
function prevQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ>0) currentQ--; showQuestion(); }
function goToQ(i){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; currentQ=i; showQuestion(); }
function backToMenu(){ clearInterval(timer); document.getElementById('examArea').style.display='none'; document.getElementById('menu').style.display='block'; }

function saveProgress(){
  localStorage.setItem('shanaProgress', JSON.stringify({mod:selectedModule, q:currentQ, answers:userAnswers, time:timeLeft}));
}

function gradeTextAnswer(userAns, keywords){ if(!userAns) return 0; let lower = userAns.toLowerCase(); let hits = keywords.filter(k=>lower.includes(k)).length; return Math.min(1, hits/keywords.length); }

function submitPaper(){
  clearInterval(timer); localStorage.removeItem('shanaProgress');
  if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`)?.value;
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('questionsArea').innerHTML = ''; document.getElementById('navGrid').innerHTML = '';

  let score=0, total=0;
  currentPaper.forEach((q,i)=>{
    total += q.marks;
    let userAns = userAnswers[i];
    let marksAwarded = q.type==="MCQ"? (userAns===q.ans? q.marks : 0) : Math.round(q.marks * gradeTextAnswer(userAns, q.keywords));
    score += marksAwarded;
  });
  let percent = Math.round((score/total)*100);
  stats[selectedModule].push({date:new Date().toLocaleDateString(), score, total, percent});
  localStorage.setItem('shanaStats', JSON.stringify(stats));

  let memoHTML = `<h2>FINAL: ${score}/${total} = ${percent}% - ${percent>=50?'PASS':'FAIL'}</h2>`;
  currentPaper.forEach((q,i)=>{
    let correctText = q.type==="MCQ"? q.options.find(o=>o.startsWith(q.ans)) : q.ans;
    memoHTML += `<div style="margin-bottom:15px;"><b>Q${i+1}.</b> ${q.q}<br><b>Your:</b> ${userAnswers[i] || 'No Answer'}<br><div style="color:var(--green)"><b>Memo:</b> ${correctText}</div></div>`;
  });
  document.getElementById('memoArea').innerHTML = memoHTML;
  document.getElementById('memoArea').style.display = 'block';
  document.getElementById('timer').innerText = 'EXAM COMPLETED';
}

function showAnalytics(){
  document.getElementById('menu').style.display='none';
  document.getElementById('analyticsArea').style.display='block';
  let html='';
  for(let mod in stats){
    let last5 = stats[mod].slice(-5);
    let avg = last5.length? Math.round(last5.reduce((a,b)=>a+b.percent,0)/last5.length) : 0;
    html += `<div class="stat-box"><h3>${mod.toUpperCase()}</h3><p>Avg: ${avg}%</p><p>Attempts: ${stats[mod].length}</p></div>`;
  }
  document.getElementById('statsGrid').innerHTML = html;
}
</script>
</body>
</html>
