// 750 ENGINE - NOW TRULY RANDOM WITH ANSWER SHUFFLE
function generate750(base){
  let result = [];
  for(let i=0; i<750; i++){
    let baseQ = JSON.parse(JSON.stringify(base[i % base.length]));
    baseQ.id = i;

    // SHUFFLE MCQ OPTIONS AND UPDATE ANSWER
    if(baseQ.type==="MCQ"){
      let correctText = baseQ.options.find(o=>o.startsWith(baseQ.ans));
      baseQ.options = shuffle(baseQ.options);
      baseQ.ans = correctText.charAt(0); // Update answer to new letter
    }
    result.push(baseQ);
  }
  return shuffle(result);
}

setInterval(()=>{ if(currentPaper.length > 0){ localStorage.setItem('shana_progress', JSON.stringify({currentPaper, userAnswers, currentQ, timeLeft, selectedModule})); } }, 5000);

window.onload = ()=>{ let saved = localStorage.getItem('shana_progress'); if(saved && confirm("Resume your last exam?")){ let data = JSON.parse(saved); currentPaper=data.currentPaper; userAnswers=data.userAnswers; currentQ=data.currentQ; timeLeft=data.timeLeft; selectedModule=data.selectedModule; document.getElementById('menu').style.display = 'none'; document.getElementById('examArea').style.display = 'block'; document.getElementById('paperTitle').innerText = `${selectedModule.toUpperCase()} N4\n${currentPaper.length} QUESTIONS`; buildNav(); showQuestion(); timer = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0) submitPaper(); },1000); } }

function startPaper(mod, count){
  localStorage.removeItem('shana_progress');
  selectedModule = mod;
  let bank = count > 150? generate750(baseBank[mod]) : shuffle([...baseBank[mod]]);

  // SHUFFLE OPTIONS FOR NORMAL PAPERS TOO
  bank = bank.map(q=>{
    if(q.type==="MCQ"){
      let correctText = q.options.find(o=>o.startsWith(q.ans));
      q.options = shuffle(q.options);
      q.ans = correctText.charAt(0);
    }
    return q;
  });

  currentPaper = bank.slice(0, count);
  userAnswers = new Array(currentPaper.length).fill(null); currentQ = 0; timeLeft = count * 120;
  document.getElementById('menu').style.display = 'none'; document.getElementById('examArea').style.display = 'block';
  document.getElementById('paperTitle').innerText = `${mod.toUpperCase()} N4\n${count} QUESTIONS - RANDOMIZED`;
  buildNav(); showQuestion();
  clearInterval(timer); timer = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0) submitPaper(); },1000);
}

function updateTimer(){ let h=Math.floor(timeLeft/3600), m=Math.floor((timeLeft%3600)/60), s=timeLeft%60; document.getElementById('timer').innerText = `Time: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
function buildNav(){ let html=''; currentPaper.forEach((_,i)=>{ html+=`<button class="nav-btn" id="nav${i}" onclick="goToQ(${i})">${i+1}</button>`; }); document.getElementById('navGrid').innerHTML=html; updateNav(); }
function updateNav(){
  currentPaper.forEach((_,i)=>{
    let btn=document.getElementById(`nav${i}`);
    if(!btn) return;
    if(!btn.classList.contains('review')){
      btn.classList.remove('current','done','wrong');
      if(i===currentQ) btn.classList.add('current');
      if(userAnswers[i]!==null){
        if(currentPaper[i].type==="MCQ" && userAnswers[i]===currentPaper[i].ans) btn.classList.add('done');
        else if(currentPaper[i].type==="MCQ") btn.classList.add('wrong');
        else btn.classList.add('done');
      }
    }
  });
  let progress = (userAnswers.filter(a=>a!==null).length/currentPaper.length)*100;
  document.getElementById('progressBar').style.width=progress+'%';
}
function showQuestion(){
  let q = currentPaper[currentQ];
  let html = `<div class="quiz-card">`;
  if(q.type==="MCQ") html += `<div class="section-title">SECTION A: MULTIPLE CHOICE</div>`;
  if(q.type==="DEF") html += `<div class="section-title">SECTION B: DEFINITIONS</div>`;
  if(q.type==="APP") html += `<div class="section-title">SECTION C: APPLICATION</div>`;
  html += `<p><b>Question ${currentQ+1} of ${currentPaper.length}.</b> ${q.q} [${q.marks}]</p>`;
  if(q.type==="MCQ"){
    q.options.forEach(opt=>{
      let letter = opt.charAt(0);
      let selected = userAnswers[currentQ]===letter?'style="border-color:var(--accent)"':'';
      html += `<div class="quiz-option" ${selected} onclick="checkMCQ(this, '${letter}')">${opt}</div>`;
    });
  } else {
    html += `<textarea id="txt${currentQ}" rows="4" style="width:100%; background:#000; color:#fff; border:1px solid #333; border-radius:8px; padding:10px; font-size:15px;">${userAnswers[currentQ]||''}</textarea>`;
  }
  html += `</div>`;
  document.getElementById('questionsArea').innerHTML = html;
  updateNav();
}
function checkMCQ(el, choice){
  userAnswers[currentQ] = choice;
  document.querySelectorAll('.quiz-option').forEach(o=>o.style.pointerEvents='none');
  let correct = currentPaper[currentQ].ans;
  if(choice === correct){ el.classList.add('correct'); }
  else { el.classList.add('wrong'); document.querySelectorAll('.quiz-option').forEach(o=>{ if(o.textContent.startsWith(correct)) o.classList.add('correct'); }); }
  if(currentPaper[currentQ].exp){ document.querySelector('.quiz-card').innerHTML += `<div class="explanation"><b>Explanation:</b> ${currentPaper[currentQ].exp}</div>`; }
  updateNav();
  setTimeout(()=>{ if(currentQ<currentPaper.length-1) nextQ(); }, 1000);
}
function markReview(){ document.getElementById(`nav${currentQ}`).classList.add('review'); }
function nextQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ<currentPaper.length-1) currentQ++; showQuestion(); }
function prevQ(){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; if(currentQ>0) currentQ--; showQuestion(); }
function goToQ(i){ if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`).value; currentQ=i; showQuestion(); }
function backToMenu(){ clearInterval(timer); localStorage.removeItem('shana_progress'); document.getElementById('examArea').style.display='none'; document.getElementById('menu').style.display='block'; }
function gradeTextAnswer(userAns, keywords){ if(!userAns) return 0; let lower = userAns.toLowerCase(); let hits = keywords.filter(k=>lower.includes(k)).length; return Math.min(1, hits/keywords.length); }
function submitPaper(){
  clearInterval(timer); localStorage.removeItem('shana_progress');
  if(currentPaper[currentQ].type!=="MCQ") userAnswers[currentQ] = document.getElementById(`txt${currentQ}`)?.value;
  document.getElementById('submitBtn').style.display = 'none'; document.getElementById('questionsArea').innerHTML = ''; document.getElementById('navGrid').innerHTML = '';
  let score=0, total=0; let topicStats = {MCQ:0, DEF:0, APP:0, MCQ_Total:0, DEF_Total:0, APP_Total:0};
  currentPaper.forEach((q,i)=>{ total += q.marks; let userAns = userAnswers[i]; let marksAwarded = q.type==="MCQ"? (userAns===q.ans? q.marks : 0) : Math.round(q.marks * gradeTextAnswer(userAns, q.keywords)); score += marksAwarded;
    if(q.type==="MCQ") topicStats.MCQ_Total++; if(q.type==="DEF") topicStats.DEF_Total++; if(q.type==="APP") topicStats.APP_Total++;
    if(marksAwarded > 0){ if(q.type==="MCQ") topicStats.MCQ++; if(q.type==="DEF") topicStats.DEF++; if(q.type==="APP") topicStats.APP++; }
  });
  let percent = Math.round((score/total)*100);
  let mcqPer = Math.round((topicStats.MCQ/topicStats.MCQ_Total)*100) || 0;
  let defPer = Math.round((topicStats.DEF/topicStats.DEF_Total)*100) || 0;
  let appPer = Math.round((topicStats.APP/topicStats.APP_Total)*100) || 0;
  let weakest = mcqPer<defPer&&mcqPer<appPer?'Section A: MCQ':defPer<appPer?'Section B: DEF':'Section C: APP';

  let memoHTML = `<h2>GOD TIER RESULT: ${score}/${total} = ${percent}% - ${percent>=50?'PASS':'FAIL'}</h2>`;
  memoHTML += `<div class="analytics-box"><h3>PERFORMANCE BREAKDOWN</h3><div>Section A MCQ: ${mcqPer}%</div><div>Section B DEF: ${defPer}%</div><div>Section C APP: ${appPer}%</div><div style="margin-top:8px; color:var(--yellow)">⚠️ Focus more on: ${weakest}</div></div>`;

  currentPaper.forEach((q,i)=>{
    let correctText = q.type==="MCQ"? q.options.find(o=>o.startsWith(q.ans)) : q.ans;
    memoHTML += `<div style="margin-bottom:15px;"><b>Q${i+1}.</b> ${q.q}<br><b>Your:</b> ${userAnswers[i] || 'No Answer'}<br><div style="color:var(--green)"><b>Memo:</b> ${correctText}</div></div>`;
  });

  document.getElementById('memoArea').innerHTML = memoHTML;
  document.getElementById('memoArea').style.display = 'block';
  document.getElementById('timer').innerText = 'GOD TIER COMPLETED';
}
</script>
